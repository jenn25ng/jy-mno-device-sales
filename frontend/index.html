// н•ҳлӢЁ мғҒм„ён‘ң(м ңл„ӨлҰӯ) вҖ” н–ү=ліёл¶Җ(HQS мҲң), м—ҙ=мқјмһҗ + кё°к°„м§‘кі„. лӮ м§ңн—ӨлҚ” нҒҙлҰӯ=мЎ°нҡҢмқјмһҗ.
function deviceTable(title,cap,dates,hqs,hqCol,arrFn,cellFmt,aggLabel,aggFn){
  const panel=el(`<div class="panel"><h2>${title}</h2><div class="pcap2">${cap}</div></div>`);
  let h='<table class="xtab dtab"><thead><tr><th class="xh-row">ліёл¶ҖлӘ…</th>';
  dates.forEach(d=>{const sel=d===STATE.deviceViewDate;h+=`<th class="dcol${sel?" dsel":""}" data-d="${d}">${d.slice(4,6)}/${d.slice(6,8)}</th>`;});
  h+=`<th class="xh-tot">${aggLabel}</th></tr></thead><tbody>`;
  hqs.forEach(hq=>{const a=arrFn(hq)||[];
    let cells='';
    dates.forEach((d,i)=>{const sel=d===STATE.deviceViewDate;cells+=`<td class="${sel?"dsel":""}">${cellFmt(a[i]??0)}</td>`;});
    h+=`<tr><td class="xn"><i class="swatch" style="margin-right:6px;background:${hqCol[hq]}"></i>${hq}</td>${cells}<td class="xtot">${aggFn(hq,a)}</td></tr>`;});
  h+='</tbody></table>';
  const sc=el('<div class="xtab-scroll"></div>');sc.appendChild(el(h));panel.appendChild(sc);
  sc.querySelectorAll("th.dcol").forEach(th=>{th.onclick=()=>{STATE.deviceViewDate=th.dataset.d;render();};});
  return panel;
}

function tabByHq(m){
  const b=STATE.brief, hqs=b.meta.hqs, byHq=b.by_hq;   // byHqлҠ” мқҙлҜё hqs(HQS) мҲң
  if(!STATE.activeHq || (STATE.activeHq!=="м „мІҙ" && !byHq.find(h=>h.hq===STATE.activeHq))) STATE.activeHq=hqs[0];
  const companyTotal=byHq.reduce((s,h)=>s+h.total,0)||1;
  const natGroup={}; (b.overview.by_group||[]).forEach(x=>natGroup[x.group]=x.count);  // м „көӯ лӢЁл§җкө° н•©

  // в‘  лЎңм»¬ ліёл¶Җ н•„н„° ("м „мІҙ" + м •л ¬ мҲңм„ң HQS)
  const isAll=STATE.activeHq==="м „мІҙ";
  const lb=el('<div class="localbar"><div class="localbar-lbl">ліёл¶Җ м„ нғқ</div><div class="hq-chips"></div></div>');
  const chips=lb.querySelector(".hq-chips");
  const chip=(id,total,active)=>{const c=el(`<div class="hq-chip${active?" active":""}">${id}<span class="cnt">${num(total)}</span></div>`);c.onclick=()=>{STATE.activeHq=id;render();};chips.appendChild(c);};
  chip("м „мІҙ",companyTotal,isAll);
  byHq.forEach(h=>chip(h.hq,h.total,h.hq===STATE.activeHq));
  m.appendChild(lb);

  // м„ нғқ ліёл¶Җ(лҳҗлҠ” м „мӮ¬ н•©мӮ°). м „мІҙлҠ” overview.by_groupмңјлЎң нҸ¬нҠёнҸҙлҰ¬мҳӨ н•©м„ұ(кіјлӢӨ/кіјмҶҢ=0 вҶ’ л№„көҗ нҢЁл„җ мғқлһө)
  let hq;
  if(isAll){
    const gm={}; (b.overview.by_group||[]).forEach(x=>gm[x.group]=x);
    hq={hq:"м „мӮ¬", total:companyTotal, portfolio:(b.meta.device_groups||[]).map(g=>{
      const x=gm[g]||{count:0,share:0};
      return {group:g,count:x.count||0,share_in_hq:x.share||0,share_company:x.share||0,over_index:0};
    }).filter(p=>p.count>0).sort((a,b)=>b.count-a.count)};
  } else hq=byHq.find(h=>h.hq===STATE.activeHq);
  const port=hq.portfolio.filter(p=>STATE.simOn||p.group!=="SIMonly");
  const total=port.reduce((s,p)=>s+p.count,0)||1;
  const find=g=>port.find(p=>p.group===g);

  // в‘Ў KPI вҖ” ліёл¶Җ мҙқ нҢҗл§Ө(м•өм»Ө) + Top3 лӢЁл§җкө°(м „мӮ¬ к°ңмҡ” мҠӨнғҖмқј лһӯнҒ¬). мӨ‘ліө м ңкұ°
  const kpi=el('<div class="kpi-grid"></div>');
  const top3=port.slice().sort((a,b)=>b.count-a.count).slice(0,3);
  kpi.style.gridTemplateColumns=`repeat(${1+top3.length},1fr)`;
  const c1=el('<div class="kpi anchor"><div class="l"></div><div class="v"></div><div class="kpi-sub"></div></div>');
  c1.querySelector(".l").textContent=`${hq.hq} мҙқ нҢҗл§Ө`;
  c1.querySelector(".v").innerHTML=`${num(total)}<span class="u">кұҙ</span>`;
  c1.querySelector(".kpi-sub").textContent=`м „мӮ¬ ${(hq.total/companyTotal*100).toFixed(1)}%`;
  if(hq.total_delta)c1.appendChild(deltaChip(hq.total_delta));   // м „м—ӯ л№„көҗ нҷңм„ұ мӢң ліёл¶Җ мҙқ мҰқк°җ
  kpi.appendChild(c1);
  top3.forEach((p,i)=>{const col=groupColor[p.group]||"var(--accent)";
    const c=el('<div class="kpi"><div class="l kpi-rank"><span class="rk"></span><span class="rn"></span></div><div class="v"></div><div class="kpi-sub"></div></div>');
    const rk=c.querySelector(".rk");rk.textContent=`#${i+1}`;rk.style.color=col;
    const rn=c.querySelector(".rn");rn.textContent=glabel(p.group);rn.style.color=col;
    c.querySelector(".v").innerHTML=`${num(p.count)}<span class="u">кұҙ</span>`;
    c.querySelector(".kpi-sub").textContent=`ліёл¶ҖлӮҙ ${p.share_in_hq}%`;
    if(p.delta)c.appendChild(deltaChip(p.delta));                // лӢЁл§җкө° мҰқк°җ(л№„көҗ нҷңм„ұ мӢң)
    kpi.appendChild(c);
  });
  m.appendChild(kpi);

  // в‘Ў-b л№„көҗ н•ҳмқҙлқјмқҙнҠё (E) вҖ” м „м—ӯ л№„көҗ нҷңм„ұ & нҠ№м • ліёл¶Җ (м „мІҙлҠ” movers м—ҶмқҢ)
  if(!isAll && STATE.compareTo!=="none" && hq.movers) m.appendChild(hqCompareHighlight(hq));

  // в‘ў нҸ¬нҠёнҸҙлҰ¬мҳӨ лҸ„л„ӣ (+ м „мӮ¬ vs ліёл¶Җ л№„мӨ‘ л№„көҗ вҖ” м „мІҙлҠ” л№„көҗ лҢҖмғҒмқҙ мһҗкё° мһҗмӢ мқҙлқј мғқлһө)
  const donutGroups=sortByG(hq.portfolio.map(p=>({group:p.group,count:p.count})),p=>p.group);   // GORDER кі м • мҲңм„ң (SIMonly OFF мӢң "вҖ”")
  if(isAll){
    m.appendChild(donutPanel(donutGroups,total,"м „мӮ¬ лӢЁл§җкө° нҸ¬нҠёнҸҙлҰ¬мҳӨ"));
  }else{
    const grid=el('<div class="grid-2"></div>');
    grid.appendChild(donutPanel(donutGroups,total,`${hq.hq} лӢЁл§җкө° нҸ¬нҠёнҸҙлҰ¬мҳӨ`));
    grid.appendChild(comparePanel(hq,port));
    m.appendChild(grid);
  }

  // лӢЁл§җкө° Г— мқјмһҗлі„ м¶”мқҙ (м „мӮ¬к°ңмҡ”мҷҖ лҸҷмқј м°ЁнҠё) вҖ” лӢЁл§җкө° мғҒм„ё л°”лЎң мң„. м „мІҙ=м „мӮ¬, нҠ№м •ліёл¶Җ=ліёл¶Җлі„
  const dgsHq = isAll ? b.daily_group_series : hq.daily_group_series;
  if(dgsHq && dgsHq.dates && dgsHq.dates.length) m.appendChild(dailyGroupLineChart(dgsHq, sortByG(b.meta.device_groups||[])));

  // в‘Ј лӢЁл§җкө° мғҒм„ён‘ң (нҢҗл§Ө лӮҙлҰјм°ЁмҲң) вҖ” н–ү нҒҙлҰӯ вҶ’ м•„лһҳ SKU л“ңлҰҙлӢӨмҡҙ м„ нғқ
  m.appendChild(hqDetailTable(hq,port,total,natGroup));
  if(!isAll)m.appendChild(el('<div class="pcap">кіјлӢӨ/кіјмҶҢ м§ҖмҲҳ = ліёл¶ҖлӮҙл№„мӨ‘ вҲ’ м „мӮ¬л№„мӨ‘ | м–‘мҲҳ(мҙҲлЎқ): м „көӯ лҢҖл№„ лҶ’мқҢ | мқҢмҲҳ(л№Ёк°•): м „көӯ лҢҖл№„ лӮ®мқҢ</div>'));

  // в‘Ө м„ нғқ лӢЁл§җкө° SKU л“ңлҰҙлӢӨмҡҙ (мғҒм„ён‘ңм—җм„ң нҒҙлҰӯн•ң лӢЁл§җкө° кё°мӨҖ)
  m.appendChild(drillSkuPanel(port,hq.hq,isAll));
}

function comparePanel(hq,port){
  const panel=el('<div class="panel"><h2></h2><div class="pcap2">м „көӯ нҸүк·  лҢҖл№„ over/under-index нҢҢм•…</div></div>');
  panel.querySelector("h2").textContent=`м „мӮ¬ vs ${hq.hq} лӢЁл§җкө° л№„мӨ‘ л№„көҗ`;
  panel.appendChild(el(`<div class="cmp-legend"><span><i style="background:var(--line2)"></i>м „мӮ¬ л№„мӨ‘</span><span><i style="background:var(--blue)"></i>${hq.hq} л№„мӨ‘</span></div>`));
  const items=sortByG(port,p=>p.group);   // GORDER кі м • мҲңм„ң
  const max=Math.max(...items.flatMap(p=>[p.share_company,p.share_in_hq]),1);
  items.forEach(p=>{
    const row=el('<div class="cmp-row"><div class="cmp-name"></div><div class="cmp-bars"></div><div class="cmp-val"></div></div>');
    row.querySelector(".cmp-name").textContent=glabel(p.group);
    const bars=row.querySelector(".cmp-bars");
    const b1=el(`<div class="cmp-bar" style="width:${Math.max(2,p.share_company/max*100)}%;background:var(--line2)"></div>`);
    const b2=el(`<div class="cmp-bar" style="width:${Math.max(2,p.share_in_hq/max*100)}%;background:var(--blue)"></div>`);
    attachTip(b1,`<span class="tip-k">м „мӮ¬</span> ${glabel(p.group)} В· <b>${p.share_company}%</b>`);
    attachTip(b2,`<span class="tip-k">${hq.hq}</span> ${glabel(p.group)} В· <b>${p.share_in_hq}%</b>`);
    bars.appendChild(b1); bars.appendChild(b2);
    const oi=p.over_index, cls=oi>0?"oi-pos":(oi<0?"oi-neg":"");
    row.querySelector(".cmp-val").innerHTML=`${p.share_in_hq}% <span class="${cls}">(${oi>0?"+":""}${oi}%)</span>`;
    panel.appendChild(row);
  });
  return panel;
}

function drillSkuPanel(port,hqName,isAll){
  const panel=el('<div class="panel"><h2></h2></div>');
  // нҢҗл§Ө мһҲлҠ” лӢЁл§җкө°л§Ң л“ңлҰҙлӢӨмҡҙ лҢҖмғҒ (SKU м„ёл¶ҖлҠ” мҳЁл””л§Ёл“ңлқј port кё°мӨҖмңјлЎң нҢҗлӢЁ)
  const avail=port.filter(p=>(p.count||0)>0).map(p=>p.group);
  if(!avail.length){panel.querySelector("h2").textContent=`лӢЁл§җкө° SKU мғҒм„ё В· ${hqName}`;panel.appendChild(el('<div class="loading">SKU лҚ°мқҙн„° м—ҶмқҢ</div>'));return panel;}
  if(!STATE.drillGroup || !avail.includes(STATE.drillGroup)) STATE.drillGroup=avail[0];
  const g=STATE.drillGroup;
  panel.querySelector("h2").innerHTML=`<i class="swatch" style="display:inline-block;margin-right:7px;vertical-align:middle;background:${groupColor[g]}"></i>${glabel(g)} SKU мғҒм„ё В· ${hqName} <span style="font-size:11px;font-weight:600;color:var(--dim)">(мғҒм„ён‘ңм—җм„ң лӢЁл§җкө° нҒҙлҰӯ)</span>`;
  const body=el('<div class="loading">SKU л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>'); panel.appendChild(body);
  const qs=new URLSearchParams({device_group:g});
  if(STATE.rangeStart)qs.set("period_start",STATE.rangeStart);
  if(STATE.rangeEnd)qs.set("period_end",STATE.rangeEnd);
  if(STATE.scrbType&&STATE.scrbType!=="м „мІҙ")qs.set("scrb_type",STATE.scrbType);
  if(STATE.channel&&STATE.channel!=="м „мІҙ")qs.set("channel",STATE.channel);
  if(STATE.agreeType&&STATE.agreeType!=="м „мІҙ")qs.set("agree_type",STATE.agreeType);
  fetch("/api/sku?"+qs.toString()).then(r=>r.json()).then(s=>{
    if(STATE.drillGroup!==g) return;                                   // к·ё мӮ¬мқҙ лӢӨлҘё кө° нҒҙлҰӯлҗЁ
    const src=isAll ? (s.by_sku||[]).map(d=>({sku:d.sku,series:d.series,variant:d.variant,cnt:d.count}))
                    : (s.detail||[]).map(d=>({sku:d.sku,series:d.series,variant:d.variant,cnt:(d.hq_counts&&d.hq_counts[hqName])||0}));
    const rows=src.filter(r=>r.cnt>0).sort((a,b)=>b.cnt-a.cnt); rows.forEach(r=>r._v=r.cnt);
    body.remove();
    if(!rows.length){panel.appendChild(el('<div class="loading">SKU лҚ°мқҙн„° м—ҶмқҢ</div>'));return;}
    const max=Math.max(...rows.map(r=>r.cnt),1);
    const multi=new Set(rows.map(r=>r.series||"")).size>1;             // м—¬лҹ¬ кё°кё° м„һмқё кө°(SIMonly л“ұ)вҶ’ кё°кё°лӘ… н‘ңмӢң
    const lbl=r=> multi ? (r.sku||r.variant||"-") : (r.variant||r.sku||"-");
    panel.appendChild(barList(rows,max,()=>groupColor[g],lbl,r=>num(r.cnt)));
  }).catch(()=>{body.textContent="SKU мЎ°нҡҢ мӢӨнҢЁ";});
  return panel;
}

function hqDetailTable(hq,port,total,natGroup){
  const panel=el('<div class="panel"><h2></h2><div class="pcap2">н–ү нҒҙлҰӯ вҶ’ м•„лһҳ SKU л“ңлҰҙлӢӨмҡҙ</div><div class="xtab-scroll"></div></div>');
  panel.querySelector("h2").textContent=`${hq.hq} лӢЁл§җкө° мғҒм„ё (нҢҗл§Ө лӮҙлҰјм°ЁмҲң)`;
  const rows=port.slice().sort((a,b)=>b.count-a.count);
  let h='<table class="xtab"><thead><tr><th class="xh-row">лӢЁл§җкө°</th><th>нҢҗл§ӨкұҙмҲҳ</th><th>ліёл¶ҖлӮҙл№„мӨ‘</th><th>м „мӮ¬л№„мӨ‘</th><th>ліёл¶Җк°„м җмң л№„</th><th>кіјлӢӨ/кіјмҶҢ м§ҖмҲҳ</th></tr></thead><tbody>';
  rows.forEach(p=>{
    const inter=natGroup[p.group]?(p.count/natGroup[p.group]*100).toFixed(1):"0.0";
    const oi=p.over_index, cls=oi>0?"oi-pos":(oi<0?"oi-neg":"");
    h+=`<tr class="drill-row${p.group===STATE.drillGroup?" sel":""}" data-g="${p.group}"><td class="xn"><i class="swatch" style="margin-right:7px;background:${groupColor[p.group]}"></i>${glabel(p.group)}</td>`
      +`<td>${num(p.count)}</td><td>${p.share_in_hq}%</td><td>${p.share_company}%</td><td>${inter}%</td>`
      +`<td><span class="oi-pill ${cls}">${oi>0?"+":""}${oi}%</span></td></tr>`;
  });
  h+=`</tbody><tfoot><tr><td class="xn">н•©кі„</td><td class="xtot">${num(total)}</td><td>100.0%</td><td>вҖ”</td><td>вҖ”</td><td>вҖ”</td></tr></tfoot></table>`;
  panel.querySelector(".xtab-scroll").innerHTML=h;
  panel.querySelectorAll("tbody tr[data-g]").forEach(tr=>tr.onclick=()=>{STATE.drillGroup=tr.dataset.g;render();});
  return panel;
}

// в”Җв”Җ нғӯ: м•ҢлҰј (лЈ° кё°л°ҳ В· н…ңн”ҢлҰҝ л¬ёкө¬) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const ALV={urgent:"кёҙкёү",warn:"мЈјмқҳ",info:"м •ліҙ"};
const ALV_COLOR={urgent:"var(--red)",warn:"var(--warn)",info:"var(--blue)"};
function tabAlerts(m){
  const b=STATE.brief;
  const items=(b.alerts||[]).filter(a=>STATE.simOn||a.group!=="SIMonly");
  const counts={urgent:0,warn:0,info:0}; items.forEach(a=>counts[a.level]++);
  const r=b.meta.range||{}; const mLabel=(r.start&&r.end)
    ? (r.start.slice(0,6)===r.end.slice(0,6) ? `${+r.start.slice(4,6)}мӣ”`
       : `${r.start.slice(4,6)}/${r.start.slice(6,8)}~${r.end.slice(4,6)}/${r.end.slice(6,8)}`)
    : "м„ нғқ кё°к°„";

  // в“Ә мӢ к·ң/лҜёл¶„лҘҳ лӢЁл§җкө° к°җм§Җ л°°л„Ҳ (л§ҲнҠём—җ м•ұмқҙ лӘЁлҘҙлҠ” device_groupмқҙ л“Өм–ҙмҳӨл©ҙ)
  const unk=(b.meta.unknown_groups||[]).filter(g=>STATE.simOn||g!=="SIMonly");
  if(unk.length){
    const bn=el('<div class="acard lv-warn" style="margin-bottom:14px"><div class="acard-top"><span class="alv warn">мӢ к·ң</span><span class="atag">лӢЁл§җкө°</span><span class="atitle">мӢ к·ң/лҜёл¶„лҘҳ лӢЁл§җкө° к°җм§Җ</span></div><div class="adetail"></div><div class="anote">л§ҲнҠё device_groupм—җ м•ұмқҙ лӘЁлҘҙлҠ” к°’мқҙ мң мһ…лҗЁ вҖ” нҳ„мһ¬ мӣҗліёлӘ…В·кё°ліёмғүмңјлЎң л…ём¶ң мӨ‘. лӢЁл§җкө° мғү/лқјлІЁ(GCOLORВ·GLABEL) м •мқҳ н•„мҡ”.</div></div>');
    bn.querySelector(".adetail").textContent=unk.join(", ");
    m.appendChild(bn);
  }

  // в‘  KPI 4
  const kpi=el('<div class="kpi-grid"></div>');
  const mk=(label,val,sub,color)=>{const c=el('<div class="kpi"><div class="l"></div><div class="v"></div><div class="kpi-sub"></div></div>');
    c.querySelector(".l").textContent=label; const v=c.querySelector(".v"); v.innerHTML=`${val}<span class="u">кұҙ</span>`;
    if(color)v.style.color=color; c.querySelector(".kpi-sub").textContent=sub; return c;};
  kpi.appendChild(mk("м „мІҙ м•ҢлҰј",items.length,`${mLabel} лҲ„м Ғ`));
  kpi.appendChild(mk("кёҙкёү",counts.urgent,"мҰүмӢң нҷ•мқё",counts.urgent?"var(--red)":"var(--dim)"));
  kpi.appendChild(mk("мЈјмқҳ",counts.warn,"м¶”мқҙ лӘЁлӢҲн„°л§Ғ",counts.warn?"var(--warn)":"var(--dim)"));
  kpi.appendChild(mk("м •ліҙ",counts.info,"м°ёкі  мӮ¬н•ӯ",counts.info?"var(--blue)":"var(--dim)"));
  m.appendChild(kpi);

  // в‘Ў мқјлі„ нҢҗл§Ө м¶”мқҙ (м•ҢлҰј л°ңмғқмқј к°•мЎ°)
  m.appendChild(alertDailyPanel(b.alert_daily||[],items,mLabel));

  // в‘ў м•ҢлҰј лӘ©лЎқ + м№ҙн…Ңкі лҰ¬ н•„н„°
  const CATS=[["м „мІҙ","м „мІҙ"],["нҢҗл§Өлҹү","sales"],["ліёл¶Җлі„","hq"],["лӢЁл§җкө°","group"],["S26кө°","g:S26"],["IP17кө°","g:IP17"],["SIM","g:SIMonly"],["SKU","sku"]];
  const cur=STATE.alertCat||"м „мІҙ";
  const match=a=>{ if(cur==="м „мІҙ")return true;
    if(cur.startsWith("g:"))return a.group===cur.slice(2);
    return a.category===cur; };
  const shown=items.filter(match);
  const panel=el('<div class="panel"></div>');
  const hd=el('<div class="panel-hd"></div>');
  hd.appendChild(el(`<h2>м•ҢлҰј лӘ©лЎқ <span style="color:var(--dim);font-weight:600">(${shown.length}кұҙ)</span></h2>`));
  const cats=el('<div class="acats"></div>');
  CATS.forEach(([lbl,val])=>{const c=el(`<div class="acat${cur===val?" active":""}">${lbl}</div>`);c.onclick=()=>{STATE.alertCat=val;render();};cats.appendChild(c);});
  hd.appendChild(cats); panel.appendChild(hd);
  if(!shown.length)panel.appendChild(el('<div class="loading">н•ҙлӢ№ м•ҢлҰј м—ҶмқҢ</div>'));
  shown.forEach(a=>{
    const tag = a.category==="hq" ? "ліёл¶Җ" : (a.group?glabel(a.group):a.cat_label);
    const d=a.date||"";
    const card=el(`<div class="acard lv-${a.level}"><div class="acard-top"><span class="alv ${a.level}">${ALV[a.level]}</span><span class="atag"></span><span class="atitle"></span><span class="adate">${d?`'${d.slice(2,4)}/${d.slice(4,6)}/${d.slice(6,8)}`:""}</span></div><div class="adetail"></div><div class="anote"></div></div>`);
    card.querySelector(".atag").textContent=tag;
    card.querySelector(".atitle").textContent=a.title;
    card.querySelector(".adetail").textContent=a.detail||"";
    card.querySelector(".anote").textContent=a.note||"";
    panel.appendChild(card);
  });
  m.appendChild(panel);
}

function alertDailyPanel(daily,items,mLabel){
  const panel=el('<div class="panel"><h2></h2></div>');
  panel.querySelector("h2").textContent=`${mLabel} мқјлі„ нҢҗл§Ө м¶”мқҙ (м•ҢлҰј л°ңмғқмқј к°•мЎ°)`;
  panel.appendChild(el(`<div class="alegend">
    <span><i style="background:var(--red)"></i>кёҙкёү</span><span><i style="background:var(--warn)"></i>мЈјмқҳ</span>
    <span><i style="background:var(--blue)"></i>м •ліҙ</span><span><i style="background:var(--line2)"></i>мқҙмғҒм—ҶмқҢ</span></div>`));
  const rank={urgent:0,warn:1,info:2};
  const dayLv={};                 // лӮ м§ңвҶ’н•ҙлӢ№мқј мөңкі  мӢ¬к°ҒлҸ„
  items.forEach(a=>{ if(!a.date)return; const p=dayLv[a.date];
    if(p===undefined||rank[a.level]<rank[p])dayLv[a.date]=a.level; });
  const bars=el('<div class="abars"></div>');
  const max=Math.max(...daily.map(d=>d.total),1);
  daily.forEach(d=>{
    const lv=dayLv[d.date];
    const color=lv?ALV_COLOR[lv]:"var(--line2)";
    const h=Math.max(2,d.total/max*100);
    const col=el(`<div class="abar-col"><div class="abar" style="height:${h}%;background:${color}"></div><div class="abar-x">${+d.date.slice(6,8)}мқј</div></div>`);
    attachTip(col.querySelector(".abar"),`<span class="tip-k">${fmtD(d.date)}${lv?" В· "+ALV[lv]:""}</span><br><b>${num(d.total)}</b> <span class="tip-k">кұҙ</span>`);
    bars.appendChild(col);
  });
  panel.appendChild(bars);
  return panel;
}

// в”Җв”Җ нғӯ: ліёл¶Җ л§ӨнҠёлҰӯмҠӨ (нһҲнҠёл§ө вҖ” лӢЁл§җкө° мғүмңјлЎң м…Җ нӢҙнҠё) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function tabMatrix(m){
  const mx=STATE.brief.matrix;
  const groups=sortByG(mx.groups.filter(g=>STATE.simOn||g!=="SIMonly"));   // м „м—ӯ SIMonly н•„н„° + кі м • мҲңм„ң
  const cnt={};
  mx.cells.forEach(c=>cnt[c.hq+"|"+c.group]=c.count);
  const cell=(hq,g)=>cnt[hq+"|"+g]||0;
  const rowTot={}; mx.hqs.forEach(hq=>rowTot[hq]=groups.reduce((s,g)=>s+cell(hq,g),0));
  const colTot={}; groups.forEach(g=>colTot[g]=mx.hqs.reduce((s,hq)=>s+cell(hq,g),0));
  const grand=mx.hqs.reduce((s,hq)=>s+rowTot[hq],0)||1;
  // м…Җ мғү = кіјлӢӨ/кіјмҶҢ м§ҖмҲҳ(ліёл¶ҖлӮҙл№„мӨ‘ вҲ’ м „мӮ¬л№„мӨ‘) вҖ” мҙҲлЎқ кіјлӢӨ / л№Ёк°• кіјмҶҢ
  const compSh={}; groups.forEach(g=>compSh[g]=grand?colTot[g]/grand*100:0);
  let mo=null,mu=null;
  mx.hqs.forEach(hq=>groups.forEach(g=>{const r=rowTot[hq]?cell(hq,g)/rowTot[hq]*100:0;const gap=r-compSh[g];
    if(!mo||gap>mo.gap)mo={hq,g,gap}; if(!mu||gap<mu.gap)mu={hq,g,gap};}));
  if(mo&&mu){
    const pts=el('<div class="hl-wrap" style="margin-bottom:16px"></div>');
    pts.appendChild(el(`<div class="hl-badge up"><span class="hl-dim">мөңлҢҖ кіјлӢӨ</span><span class="hl-lb">${mo.hq} В· ${glabel(mo.g)}</span><span class="hl-pct">+${mo.gap.toFixed(1)}%</span></div>`));
    pts.appendChild(el(`<div class="hl-badge down"><span class="hl-dim">мөңлҢҖ кіјмҶҢ</span><span class="hl-lb">${mu.hq} В· ${glabel(mu.g)}</span><span class="hl-pct">вҲ’${Math.abs(mu.gap).toFixed(1)}%</span></div>`));
    m.appendChild(pts);
  }

  const p=el('<div class="panel"><h2>ліёл¶Җ Г— лӢЁл§җкө° нһҲнҠёл§ө</h2><div class="pcap2">м…Җ: нҢҗл§ӨкұҙмҲҳ В· ліёл¶ҖлӮҙл№„мӨ‘% / ліёл¶Җк°„м җмң л№„% | мғү = кіјлӢӨ/кіјмҶҢ м§ҖмҲҳ(мҙҲлЎқ кіјлӢӨ В· л№Ёк°• кіјмҶҢ)</div><div class="xtab-scroll"></div></div>');
  const tbl=el('<table class="heat2"></table>');
  // header
  let head='<thead><tr><th class="h-row">ліёл¶Җ</th>';
  groups.forEach(g=>head+=`<th><span class="gdot" style="background:${groupColor[g]}"></span>${glabel(g)}</th>`);
  head+='<th>н•©кі„</th></tr></thead>';
  tbl.appendChild(el(head));
  // body
  const tb=el('<tbody></tbody>');
  mx.hqs.forEach((hq,hi)=>{
    const tr=el('<tr></tr>');
    tr.appendChild(el(`<td class="h-hq"><span class="hdot" style="background:${hqColor(hi)}"></span>${hq}</td>`));
    groups.forEach((g,gi)=>{
      const c=cell(hq,g), r=rowTot[hq]?c/rowTot[hq]*100:0, gap=r-compSh[g];
      const btw=colTot[g]?c/colTot[g]*100:0;                        // ліёл¶Җк°„м җмң л№„
      const bg=Math.abs(gap)<0.2?"var(--surface2)":`rgba(${gap>0?"14,159,110":"234,0,44"},${Math.min(.5,.10+Math.abs(gap)/3*.4).toFixed(2)})`;
      const td=el(`<td class="cell" style="background:${bg};animation-delay:${gi*35}ms"><div class="c-cnt">${num(c)}</div><div class="c-rt">${r.toFixed(1)}% <span style="opacity:.65">/ ${btw.toFixed(1)}%</span></div></td>`);
      attachTip(td,`<div class="tip-k">${hq}</div><i class="tip-sw" style="background:${groupColor[g]||'#888'}"></i>${glabel(g)} В· <b>${num(c)}</b> <span class="tip-k">кұҙ</span><br><span class="tip-k">ліёл¶ҖлӮҙ ${r.toFixed(1)}% В· ліёл¶Җк°„ ${btw.toFixed(1)}% В· кіјлӢӨ/кіјмҶҢ ${gap>=0?"+":""}${gap.toFixed(1)}%</span>`);
      tr.appendChild(td);
    });
    tr.appendChild(el(`<td class="rtot">${num(rowTot[hq])}</td>`));
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);
  // footer м „мӮ¬н•© (лӢЁл§җкө° мғү мҲ«мһҗ)
  let foot='<tfoot><tr><td class="f-lbl">м „мӮ¬н•©</td>';
  groups.forEach(g=>{const c=colTot[g];foot+=`<td><div class="f-cnt" style="color:${groupColor[g]}">${num(c)}</div><div class="f-rt">${(c/grand*100).toFixed(1)}%</div></td>`;});
  foot+=`<td class="rtot">${num(grand)}</td></tr></tfoot>`;
  tbl.appendChild(el(foot));
  p.querySelector(".xtab-scroll").appendChild(tbl);
  m.appendChild(p);
}

// в”Җв”Җ init в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// (кё°мӨҖмӣ”/мЎ°нҡҢ/SIMonly м „м—ӯл°” м ңкұ° вҖ” лӮ м§ңлҠ” м „мӮ¬к°ңмҡ” лӢ¬л Ҙ, SIMonlyлҠ” м»ЁнҠёлЎӨл°”лЎң мқҙлҸҷ)

// в”Җв”Җ н…Ңл§Ҳ: лқјмқҙнҠё/лӢӨнҒ¬ нҶ кёҖ + localStorage persist в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const THEME_KEY="mds-theme";
function applyTheme(t){
  document.body.dataset.theme=t;
  // лІ„нҠј м•„мқҙмҪҳ: нҳ„мһ¬ лӢӨнҒ¬л©ҙ вҳҖпёҸ(лқјмқҙнҠёлЎң), лқјмқҙнҠёл©ҙ рҹҢҷ(лӢӨнҒ¬лЎң)
  document.getElementById("themeBtn").textContent=(t==="dark")?"в—‘":"в—җ";
}
function initTheme(){
  // кё°ліёмқҖ лқјмқҙнҠё. мӮ¬мҡ©мһҗк°Җ нҶ кёҖлЎң л°”кҫј м Ғ мһҲмңјл©ҙ к·ё м„ нҳёлҘј мң м§Җ(localStorage).
  let t=localStorage.getItem(THEME_KEY);
  if(t!=="light"&&t!=="dark") t="light";
  applyTheme(t);
}
document.getElementById("themeBtn").onclick=()=>{
  const next=document.body.dataset.theme==="dark"?"light":"dark";
  localStorage.setItem(THEME_KEY,next);
  applyTheme(next);
  assignColors();           // н…Ңл§Ҳ нҢ”л ҲнҠёлЎң лӢЁл§җкө° мғү мһ¬л§Өн•‘
  if(STATE.brief||STATE.ov) render();
};
document.getElementById("helpBtn").onclick=()=>alert(
  "MNO лӢЁл§җ нҢҗл§Ө лӘЁлӢҲн„°л§Ғ\n\n"+
  "В· кё°мӨҖмӣ”(YYYYMM) мһ…л Ҙ нӣ„ мЎ°нҡҢ\n"+
  "В· 4нғӯ: м „мӮ¬к°ңмҡ” / ліёл¶Җлі„ / ліёл¶Җ л§ӨнҠёлҰӯмҠӨ / м•ҢлҰј\n"+
  "В· кіјлӢӨ/кіјмҶҢ м§ҖмҲҳ = ліёл¶ҖлӮҙл№„мӨ‘ вҲ’ м „мӮ¬л№„мӨ‘\n"+
  "В· мҡ°мғҒлӢЁ в—җ лІ„нҠјмңјлЎң лқјмқҙнҠёВ·лӢӨнҒ¬ м „нҷҳ (мһҗлҸҷ м ҖмһҘ)\n"+
  "В· мўҢмғҒлӢЁ мғҒнғңм№© нҒҙлҰӯ вҶ’ лҚ°мқҙн„° м—°кІ° 4лӢЁкі„ м§„лӢЁ\n\n"+
  "лҚ°мқҙн„° мҶҢмҠӨ: obt_encore_max.device_sales_summary_daily3 (Polaris Gateway л©”лӘЁлҰ¬ мәҗмӢң)");

// мғҒнғңм№© нҒҙлҰӯ вҶ’ м§„лӢЁ л“ңлЎңм–ҙ
const _chip=document.getElementById("srcChip");
_chip.classList.add("clickable"); _chip.onclick=openDiag;
document.getElementById("diagClose").onclick=closeDiag;
document.getElementById("diagBackdrop").onclick=closeDiag;
// лҚ°мқҙн„° лӢӨмӢң л¶Ҳлҹ¬мҳӨкё° вҖ” /api/refresh(Gateway мһ¬мЎ°нҡҢ + мәҗмӢң көҗмІҙ) нӣ„ м§„лӢЁВ·нҷ”л©ҙ к°ұмӢ 
// мһ¬м Ғмһ¬лҠ” л°ұк·ёлқјмҡҙл“ң нҠёлҰ¬кұ°л§Ң(мҲҳ л¶„ мҶҢмҡ” вҶ’ лҸҷкё° лҢҖкё° мӢң ALB 504). мҷ„лЈҢ к°җм§ҖВ·нҷ”л©ҙ к°ұмӢ мқҖ
// loadDiagnosticsмқҳ 3мҙҲ нҸҙл§Ғмқҙ лӢҙлӢ№(loadingвҶ’мҷ„лЈҢ м „нҷҳ мӢң мһҗлҸҷ loadStatusвҶ’loadPeriod).
document.getElementById("diagReload").onclick=async()=>{
  const b=document.getElementById("diagReload"); b.classList.add("spinning"); b.disabled=true;
  document.body.classList.add("loading-on");   // к°ұмӢ  мӨ‘ л°°л„Ҳ + ліёл¬ё нқҗлҰј(мһ м •к°’ н‘ңмӢң)
  const sub=document.getElementById("diagSub"); if(sub)sub.textContent="лҚ°мқҙн„° лӢӨмӢң л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ (мҲҳ л¶„ мҶҢмҡ”, мҷ„лЈҢлҗҳл©ҙ мһҗлҸҷ к°ұмӢ лҗ©лӢҲлӢӨ)";
  try{
    await fetch("/api/refresh",{method:"POST"}).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
    _wasLoading=true;            // лӢӨмқҢ нҸҙл§Ғм—җм„ң loadingвҶ’мҷ„лЈҢ м „нҷҳмқ„ к°җм§Җн•ҙ мһҗлҸҷ к°ұмӢ н•ҳлҸ„лЎқ
    loadDiagnostics();           // 3мҙҲ нҸҙл§Ғ мӢңмһ‘ вҶ’ мҷ„лЈҢ мӢң л°°л„Ҳ н•ҙм ң + лҚ°мқҙн„° мһҗлҸҷ мһ¬м§‘кі„
  }catch(e){
    if(sub)sub.textContent="мһ¬м Ғмһ¬ нҠёлҰ¬кұ° мӢӨнҢЁ: "+e.message;
    document.body.classList.remove("loading-on");
  }finally{ b.classList.remove("spinning"); b.disabled=false; }  // лІ„нҠјмқҖ мҰүмӢң ліөкө¬(лҢҖкё° X)
};

initTheme();
// м Ғмһ¬ м „м—” statusк°Җ мөңмӢ мқјмқ„ лӘ» мӨ„ мҲҳ мһҲм–ҙ, briefлЎң лҚ°мқҙн„° лЎңл“ң ліҙмһҘ нӣ„ loadStatus мһ¬нҳём¶ң вҶ’ anchor=лҚ°мқҙн„° max
(async()=>{await loadStatus();loadDiagnostics();await loadBrief();await loadStatus();applyChip(STATE.chip);})();
</script>
