// 하단 상세표(제네릭) — 행=본부(HQS 순), 열=일자 + 기간집계. 날짜헤더 클릭=조회일자.
function deviceTable(title,cap,dates,hqs,hqCol,arrFn,cellFmt,aggLabel,aggFn){
  const panel=el(`<div class="panel"><h2>${title}</h2><div class="pcap2">${cap}</div></div>`);
  let h='<table class="xtab dtab"><thead><tr><th class="xh-row">본부명</th>';
  dates.forEach(d=>{const sel=d===STATE.deviceViewDate;h+=`<th class="dcol${sel?" dsel":""}" data-d="${d}">${d.slice(4,6)}/${d.slice(6,8)}</th>`;});
  h+=`<th class="xh-tot">${aggLabel}</th></tr></thead><tbody>`;
  hqs.forEach(hq=>{const a=arrFn(hq)||[];
    let cells='';
    dates.forEach((d,i)=>{const sel=d===STATE.deviceViewDate;cells+=`<td class="${sel?"dsel":""}">${cellFmt(a[i]??0)}</td>`;});
    h+=`<tr><td class="xn"><i class="swatch" style="margin-right:6px;background:${hqCol[hq]}"></i>${hq}</td>${cells}<td class="xtot">${aggFn(hq,a)}</td></tr>`;});
  h+='</tbody></table>';
  const sc=el('<div class="xtab-scroll"></div>');sc.appendChild(el(h));panel.appendChild(sc);
  sc.querySelectorAll("th.dcol").forEach(th=>{th.onclick=()=>{STATE.deviceViewDate=th.dataset.d;render();};});
  return panel;
}

function tabByHq(m){
  const b=STATE.brief, hqs=b.meta.hqs, byHq=b.by_hq;   // byHq는 이미 hqs(HQS) 순
  if(!STATE.activeHq || (STATE.activeHq!=="전체" && !byHq.find(h=>h.hq===STATE.activeHq))) STATE.activeHq=hqs[0];
  const companyTotal=byHq.reduce((s,h)=>s+h.total,0)||1;
  const natGroup={}; (b.overview.by_group||[]).forEach(x=>natGroup[x.group]=x.count);  // 전국 단말군 합

  // ① 로컬 본부 필터 ("전체" + 정렬 순서 HQS)
  const isAll=STATE.activeHq==="전체";
  const lb=el('<div class="localbar"><div class="localbar-lbl">본부 선택</div><div class="hq-chips"></div></div>');
  const chips=lb.querySelector(".hq-chips");
  const chip=(id,total,active)=>{const c=el(`<div class="hq-chip${active?" active":""}">${id}<span class="cnt">${num(total)}</span></div>`);c.onclick=()=>{STATE.activeHq=id;render();};chips.appendChild(c);};
  chip("전체",companyTotal,isAll);
  byHq.forEach(h=>chip(h.hq,h.total,h.hq===STATE.activeHq));
  m.appendChild(lb);

  // 선택 본부(또는 전사 합산). 전체는 overview.by_group으로 포트폴리오 합성(과다/과소=0 → 비교 패널 생략)
  let hq;
  if(isAll){
    const gm={}; (b.overview.by_group||[]).forEach(x=>gm[x.group]=x);
    hq={hq:"전사", total:companyTotal, portfolio:(b.meta.device_groups||[]).map(g=>{
      const x=gm[g]||{count:0,share:0};
      return {group:g,count:x.count||0,share_in_hq:x.share||0,share_company:x.share||0,over_index:0};
    }).filter(p=>p.count>0).sort((a,b)=>b.count-a.count)};
  } else hq=byHq.find(h=>h.hq===STATE.activeHq);
  const port=hq.portfolio.filter(p=>STATE.simOn||p.group!=="SIMonly");
  const total=port.reduce((s,p)=>s+p.count,0)||1;
  const find=g=>port.find(p=>p.group===g);

  // ② KPI — 본부 총 판매(앵커) + Top3 단말군(전사 개요 스타일 랭크). 중복 제거
  const kpi=el('<div class="kpi-grid"></div>');
  const top3=port.slice().sort((a,b)=>b.count-a.count).slice(0,3);
  kpi.style.gridTemplateColumns=`repeat(${1+top3.length},1fr)`;
  const c1=el('<div class="kpi anchor"><div class="l"></div><div class="v"></div><div class="kpi-sub"></div></div>');
  c1.querySelector(".l").textContent=`${hq.hq} 총 판매`;
  c1.querySelector(".v").innerHTML=`${num(total)}<span class="u">건</span>`;
  c1.querySelector(".kpi-sub").textContent=`전사 ${(hq.total/companyTotal*100).toFixed(1)}%`;
  if(hq.total_delta)c1.appendChild(deltaChip(hq.total_delta));   // 전역 비교 활성 시 본부 총 증감
  kpi.appendChild(c1);
  top3.forEach((p,i)=>{const col=groupColor[p.group]||"var(--accent)";
    const c=el('<div class="kpi"><div class="l kpi-rank"><span class="rk"></span><span class="rn"></span></div><div class="v"></div><div class="kpi-sub"></div></div>');
    const rk=c.querySelector(".rk");rk.textContent=`#${i+1}`;rk.style.color=col;
    const rn=c.querySelector(".rn");rn.textContent=glabel(p.group);rn.style.color=col;
    c.querySelector(".v").innerHTML=`${num(p.count)}<span class="u">건</span>`;
    c.querySelector(".kpi-sub").textContent=`본부내 ${p.share_in_hq}%`;
    if(p.delta)c.appendChild(deltaChip(p.delta));                // 단말군 증감(비교 활성 시)
    kpi.appendChild(c);
  });
  m.appendChild(kpi);

  // ②-b 비교 하이라이트 (E) — 전역 비교 활성 & 특정 본부 (전체는 movers 없음)
  if(!isAll && STATE.compareTo!=="none" && hq.movers) m.appendChild(hqCompareHighlight(hq));

  // ③ 포트폴리오 도넛 (+ 전사 vs 본부 비중 비교 — 전체는 비교 대상이 자기 자신이라 생략)
  const donutGroups=sortByG(hq.portfolio.map(p=>({group:p.group,count:p.count})),p=>p.group);   // GORDER 고정 순서 (SIMonly OFF 시 "—")
  if(isAll){
    m.appendChild(donutPanel(donutGroups,total,"전사 단말군 포트폴리오"));
  }else{
    const grid=el('<div class="grid-2"></div>');
    grid.appendChild(donutPanel(donutGroups,total,`${hq.hq} 단말군 포트폴리오`));
    grid.appendChild(comparePanel(hq,port));
    m.appendChild(grid);
  }

  // 단말군 × 일자별 추이 (전사개요와 동일 차트) — 단말군 상세 바로 위. 전체=전사, 특정본부=본부별
  const dgsHq = isAll ? b.daily_group_series : hq.daily_group_series;
  if(dgsHq && dgsHq.dates && dgsHq.dates.length) m.appendChild(dailyGroupLineChart(dgsHq, sortByG(b.meta.device_groups||[])));

  // ④ 단말군 상세표 (판매 내림차순) — 행 클릭 → 아래 SKU 드릴다운 선택
  m.appendChild(hqDetailTable(hq,port,total,natGroup));
  if(!isAll)m.appendChild(el('<div class="pcap">과다/과소 지수 = 본부내비중 − 전사비중 | 양수(초록): 전국 대비 높음 | 음수(빨강): 전국 대비 낮음</div>'));

  // ⑤ 선택 단말군 SKU 드릴다운 (상세표에서 클릭한 단말군 기준)
  m.appendChild(drillSkuPanel(port,hq.hq,isAll));
}

function comparePanel(hq,port){
  const panel=el('<div class="panel"><h2></h2><div class="pcap2">전국 평균 대비 over/under-index 파악</div></div>');
  panel.querySelector("h2").textContent=`전사 vs ${hq.hq} 단말군 비중 비교`;
  panel.appendChild(el(`<div class="cmp-legend"><span><i style="background:var(--line2)"></i>전사 비중</span><span><i style="background:var(--blue)"></i>${hq.hq} 비중</span></div>`));
  const items=sortByG(port,p=>p.group);   // GORDER 고정 순서
  const max=Math.max(...items.flatMap(p=>[p.share_company,p.share_in_hq]),1);
  items.forEach(p=>{
    const row=el('<div class="cmp-row"><div class="cmp-name"></div><div class="cmp-bars"></div><div class="cmp-val"></div></div>');
    row.querySelector(".cmp-name").textContent=glabel(p.group);
    const bars=row.querySelector(".cmp-bars");
    const b1=el(`<div class="cmp-bar" style="width:${Math.max(2,p.share_company/max*100)}%;background:var(--line2)"></div>`);
    const b2=el(`<div class="cmp-bar" style="width:${Math.max(2,p.share_in_hq/max*100)}%;background:var(--blue)"></div>`);
    attachTip(b1,`<span class="tip-k">전사</span> ${glabel(p.group)} · <b>${p.share_company}%</b>`);
    attachTip(b2,`<span class="tip-k">${hq.hq}</span> ${glabel(p.group)} · <b>${p.share_in_hq}%</b>`);
    bars.appendChild(b1); bars.appendChild(b2);
    const oi=p.over_index, cls=oi>0?"oi-pos":(oi<0?"oi-neg":"");
    row.querySelector(".cmp-val").innerHTML=`${p.share_in_hq}% <span class="${cls}">(${oi>0?"+":""}${oi}%)</span>`;
    panel.appendChild(row);
  });
  return panel;
}

function drillSkuPanel(port,hqName,isAll){
  const panel=el('<div class="panel"><h2></h2></div>');
  // 판매 있는 단말군만 드릴다운 대상 (SKU 세부는 온디맨드라 port 기준으로 판단)
  const avail=port.filter(p=>(p.count||0)>0).map(p=>p.group);
  if(!avail.length){panel.querySelector("h2").textContent=`단말군 SKU 상세 · ${hqName}`;panel.appendChild(el('<div class="loading">SKU 데이터 없음</div>'));return panel;}
  if(!STATE.drillGroup || !avail.includes(STATE.drillGroup)) STATE.drillGroup=avail[0];
  const g=STATE.drillGroup;
  panel.querySelector("h2").innerHTML=`<i class="swatch" style="display:inline-block;margin-right:7px;vertical-align:middle;background:${groupColor[g]}"></i>${glabel(g)} SKU 상세 · ${hqName} <span style="font-size:11px;font-weight:600;color:var(--dim)">(상세표에서 단말군 클릭)</span>`;
  const body=el('<div class="loading">SKU 불러오는 중…</div>'); panel.appendChild(body);
  const qs=new URLSearchParams({device_group:g});
  if(STATE.rangeStart)qs.set("period_start",STATE.rangeStart);
  if(STATE.rangeEnd)qs.set("period_end",STATE.rangeEnd);
  if(STATE.scrbType&&STATE.scrbType!=="전체")qs.set("scrb_type",STATE.scrbType);
  if(STATE.channel&&STATE.channel!=="전체")qs.set("channel",STATE.channel);
  if(STATE.agreeType&&STATE.agreeType!=="전체")qs.set("agree_type",STATE.agreeType);
  fetch("/api/sku?"+qs.toString()).then(r=>r.json()).then(s=>{
    if(STATE.drillGroup!==g) return;                                   // 그 사이 다른 군 클릭됨
    const src=isAll ? (s.by_sku||[]).map(d=>({sku:d.sku,series:d.series,variant:d.variant,cnt:d.count}))
                    : (s.detail||[]).map(d=>({sku:d.sku,series:d.series,variant:d.variant,cnt:(d.hq_counts&&d.hq_counts[hqName])||0}));
    const rows=src.filter(r=>r.cnt>0).sort((a,b)=>b.cnt-a.cnt); rows.forEach(r=>r._v=r.cnt);
    body.remove();
    if(!rows.length){panel.appendChild(el('<div class="loading">SKU 데이터 없음</div>'));return;}
    const max=Math.max(...rows.map(r=>r.cnt),1);
    const multi=new Set(rows.map(r=>r.series||"")).size>1;             // 여러 기기 섞인 군(SIMonly 등)→ 기기명 표시
    const lbl=r=> multi ? (r.sku||r.variant||"-") : (r.variant||r.sku||"-");
    panel.appendChild(barList(rows,max,()=>groupColor[g],lbl,r=>num(r.cnt)));
  }).catch(()=>{body.textContent="SKU 조회 실패";});
  return panel;
}

function hqDetailTable(hq,port,total,natGroup){
  const panel=el('<div class="panel"><h2></h2><div class="pcap2">행 클릭 → 아래 SKU 드릴다운</div><div class="xtab-scroll"></div></div>');
  panel.querySelector("h2").textContent=`${hq.hq} 단말군 상세 (판매 내림차순)`;
  const rows=port.slice().sort((a,b)=>b.count-a.count);
  let h='<table class="xtab"><thead><tr><th class="xh-row">단말군</th><th>판매건수</th><th>본부내비중</th><th>전사비중</th><th>본부간점유비</th><th>과다/과소 지수</th></tr></thead><tbody>';
  rows.forEach(p=>{
    const inter=natGroup[p.group]?(p.count/natGroup[p.group]*100).toFixed(1):"0.0";
    const oi=p.over_index, cls=oi>0?"oi-pos":(oi<0?"oi-neg":"");
    h+=`<tr class="drill-row${p.group===STATE.drillGroup?" sel":""}" data-g="${p.group}"><td class="xn"><i class="swatch" style="margin-right:7px;background:${groupColor[p.group]}"></i>${glabel(p.group)}</td>`
      +`<td>${num(p.count)}</td><td>${p.share_in_hq}%</td><td>${p.share_company}%</td><td>${inter}%</td>`
      +`<td><span class="oi-pill ${cls}">${oi>0?"+":""}${oi}%</span></td></tr>`;
  });
  h+=`</tbody><tfoot><tr><td class="xn">합계</td><td class="xtot">${num(total)}</td><td>100.0%</td><td>—</td><td>—</td><td>—</td></tr></tfoot></table>`;
  panel.querySelector(".xtab-scroll").innerHTML=h;
  panel.querySelectorAll("tbody tr[data-g]").forEach(tr=>tr.onclick=()=>{STATE.drillGroup=tr.dataset.g;render();});
  return panel;
}

// ── 탭: 알림 (룰 기반 · 템플릿 문구) ─────────────────────────
const ALV={urgent:"긴급",warn:"주의",info:"정보"};
const ALV_COLOR={urgent:"var(--red)",warn:"var(--warn)",info:"var(--blue)"};
function tabAlerts(m){
  const b=STATE.brief;
  const items=(b.alerts||[]).filter(a=>STATE.simOn||a.group!=="SIMonly");
  const counts={urgent:0,warn:0,info:0}; items.forEach(a=>counts[a.level]++);
  const r=b.meta.range||{}; const mLabel=(r.start&&r.end)
    ? (r.start.slice(0,6)===r.end.slice(0,6) ? `${+r.start.slice(4,6)}월`
       : `${r.start.slice(4,6)}/${r.start.slice(6,8)}~${r.end.slice(4,6)}/${r.end.slice(6,8)}`)
    : "선택 기간";

  // ⓪ 신규/미분류 단말군 감지 배너 (마트에 앱이 모르는 device_group이 들어오면)
  const unk=(b.meta.unknown_groups||[]).filter(g=>STATE.simOn||g!=="SIMonly");
  if(unk.length){
    const bn=el('<div class="acard lv-warn" style="margin-bottom:14px"><div class="acard-top"><span class="alv warn">신규</span><span class="atag">단말군</span><span class="atitle">신규/미분류 단말군 감지</span></div><div class="adetail"></div><div class="anote">마트 device_group에 앱이 모르는 값이 유입됨 — 현재 원본명·기본색으로 노출 중. 단말군 색/라벨(GCOLOR·GLABEL) 정의 필요.</div></div>');
    bn.querySelector(".adetail").textContent=unk.join(", ");
    m.appendChild(bn);
  }

  // ① KPI 4
  const kpi=el('<div class="kpi-grid"></div>');
  const mk=(label,val,sub,color)=>{const c=el('<div class="kpi"><div class="l"></div><div class="v"></div><div class="kpi-sub"></div></div>');
    c.querySelector(".l").textContent=label; const v=c.querySelector(".v"); v.innerHTML=`${val}<span class="u">건</span>`;
    if(color)v.style.color=color; c.querySelector(".kpi-sub").textContent=sub; return c;};
  kpi.appendChild(mk("전체 알림",items.length,`${mLabel} 누적`));
  kpi.appendChild(mk("긴급",counts.urgent,"즉시 확인",counts.urgent?"var(--red)":"var(--dim)"));
  kpi.appendChild(mk("주의",counts.warn,"추이 모니터링",counts.warn?"var(--warn)":"var(--dim)"));
  kpi.appendChild(mk("정보",counts.info,"참고 사항",counts.info?"var(--blue)":"var(--dim)"));
  m.appendChild(kpi);

  // ② 일별 판매 추이 (알림 발생일 강조)
  m.appendChild(alertDailyPanel(b.alert_daily||[],items,mLabel));

  // ③ 알림 목록 + 카테고리 필터
  const CATS=[["전체","전체"],["판매량","sales"],["본부별","hq"],["단말군","group"],["S26군","g:S26"],["IP17군","g:IP17"],["SIM","g:SIMonly"],["SKU","sku"]];
  const cur=STATE.alertCat||"전체";
  const match=a=>{ if(cur==="전체")return true;
    if(cur.startsWith("g:"))return a.group===cur.slice(2);
    return a.category===cur; };
  const shown=items.filter(match);
  const panel=el('<div class="panel"></div>');
  const hd=el('<div class="panel-hd"></div>');
  hd.appendChild(el(`<h2>알림 목록 <span style="color:var(--dim);font-weight:600">(${shown.length}건)</span></h2>`));
  const cats=el('<div class="acats"></div>');
  CATS.forEach(([lbl,val])=>{const c=el(`<div class="acat${cur===val?" active":""}">${lbl}</div>`);c.onclick=()=>{STATE.alertCat=val;render();};cats.appendChild(c);});
  hd.appendChild(cats); panel.appendChild(hd);
  if(!shown.length)panel.appendChild(el('<div class="loading">해당 알림 없음</div>'));
  shown.forEach(a=>{
    const tag = a.category==="hq" ? "본부" : (a.group?glabel(a.group):a.cat_label);
    const d=a.date||"";
    const card=el(`<div class="acard lv-${a.level}"><div class="acard-top"><span class="alv ${a.level}">${ALV[a.level]}</span><span class="atag"></span><span class="atitle"></span><span class="adate">${d?`'${d.slice(2,4)}/${d.slice(4,6)}/${d.slice(6,8)}`:""}</span></div><div class="adetail"></div><div class="anote"></div></div>`);
    card.querySelector(".atag").textContent=tag;
    card.querySelector(".atitle").textContent=a.title;
    card.querySelector(".adetail").textContent=a.detail||"";
    card.querySelector(".anote").textContent=a.note||"";
    panel.appendChild(card);
  });
  m.appendChild(panel);
}

function alertDailyPanel(daily,items,mLabel){
  const panel=el('<div class="panel"><h2></h2></div>');
  panel.querySelector("h2").textContent=`${mLabel} 일별 판매 추이 (알림 발생일 강조)`;
  panel.appendChild(el(`<div class="alegend">
    <span><i style="background:var(--red)"></i>긴급</span><span><i style="background:var(--warn)"></i>주의</span>
    <span><i style="background:var(--blue)"></i>정보</span><span><i style="background:var(--line2)"></i>이상없음</span></div>`));
  const rank={urgent:0,warn:1,info:2};
  const dayLv={};                 // 날짜→해당일 최고 심각도
  items.forEach(a=>{ if(!a.date)return; const p=dayLv[a.date];
    if(p===undefined||rank[a.level]<rank[p])dayLv[a.date]=a.level; });
  const bars=el('<div class="abars"></div>');
  const max=Math.max(...daily.map(d=>d.total),1);
  daily.forEach(d=>{
    const lv=dayLv[d.date];
    const color=lv?ALV_COLOR[lv]:"var(--line2)";
    const h=Math.max(2,d.total/max*100);
    const col=el(`<div class="abar-col"><div class="abar" style="height:${h}%;background:${color}"></div><div class="abar-x">${+d.date.slice(6,8)}일</div></div>`);
    attachTip(col.querySelector(".abar"),`<span class="tip-k">${fmtD(d.date)}${lv?" · "+ALV[lv]:""}</span><br><b>${num(d.total)}</b> <span class="tip-k">건</span>`);
    bars.appendChild(col);
  });
  panel.appendChild(bars);
  return panel;
}

// ── 탭: 본부 매트릭스 (히트맵 — 단말군 색으로 셀 틴트) ──────────
function tabMatrix(m){
  const mx=STATE.brief.matrix;
  const groups=sortByG(mx.groups.filter(g=>STATE.simOn||g!=="SIMonly"));   // 전역 SIMonly 필터 + 고정 순서
  const cnt={};
  mx.cells.forEach(c=>cnt[c.hq+"|"+c.group]=c.count);
  const cell=(hq,g)=>cnt[hq+"|"+g]||0;
  const rowTot={}; mx.hqs.forEach(hq=>rowTot[hq]=groups.reduce((s,g)=>s+cell(hq,g),0));
  const colTot={}; groups.forEach(g=>colTot[g]=mx.hqs.reduce((s,hq)=>s+cell(hq,g),0));
  const grand=mx.hqs.reduce((s,hq)=>s+rowTot[hq],0)||1;
  // 셀 색 = 과다/과소 지수(본부내비중 − 전사비중) — 초록 과다 / 빨강 과소
  const compSh={}; groups.forEach(g=>compSh[g]=grand?colTot[g]/grand*100:0);
  let mo=null,mu=null;
  mx.hqs.forEach(hq=>groups.forEach(g=>{const r=rowTot[hq]?cell(hq,g)/rowTot[hq]*100:0;const gap=r-compSh[g];
    if(!mo||gap>mo.gap)mo={hq,g,gap}; if(!mu||gap<mu.gap)mu={hq,g,gap};}));
  if(mo&&mu){
    const pts=el('<div class="hl-wrap" style="margin-bottom:16px"></div>');
    pts.appendChild(el(`<div class="hl-badge up"><span class="hl-dim">최대 과다</span><span class="hl-lb">${mo.hq} · ${glabel(mo.g)}</span><span class="hl-pct">+${mo.gap.toFixed(1)}%</span></div>`));
    pts.appendChild(el(`<div class="hl-badge down"><span class="hl-dim">최대 과소</span><span class="hl-lb">${mu.hq} · ${glabel(mu.g)}</span><span class="hl-pct">−${Math.abs(mu.gap).toFixed(1)}%</span></div>`));
    m.appendChild(pts);
  }

  const p=el('<div class="panel"><h2>본부 × 단말군 히트맵</h2><div class="pcap2">셀: 판매건수 · 본부내비중% / 본부간점유비% | 색 = 과다/과소 지수(초록 과다 · 빨강 과소)</div><div class="xtab-scroll"></div></div>');
  const tbl=el('<table class="heat2"></table>');
  // header
  let head='<thead><tr><th class="h-row">본부</th>';
  groups.forEach(g=>head+=`<th><span class="gdot" style="background:${groupColor[g]}"></span>${glabel(g)}</th>`);
  head+='<th>합계</th></tr></thead>';
  tbl.appendChild(el(head));
  // body
  const tb=el('<tbody></tbody>');
  mx.hqs.forEach((hq,hi)=>{
    const tr=el('<tr></tr>');
    tr.appendChild(el(`<td class="h-hq"><span class="hdot" style="background:${hqColor(hi)}"></span>${hq}</td>`));
    groups.forEach((g,gi)=>{
      const c=cell(hq,g), r=rowTot[hq]?c/rowTot[hq]*100:0, gap=r-compSh[g];
      const btw=colTot[g]?c/colTot[g]*100:0;                        // 본부간점유비
      const bg=Math.abs(gap)<0.2?"var(--surface2)":`rgba(${gap>0?"14,159,110":"234,0,44"},${Math.min(.5,.10+Math.abs(gap)/3*.4).toFixed(2)})`;
      const td=el(`<td class="cell" style="background:${bg};animation-delay:${gi*35}ms"><div class="c-cnt">${num(c)}</div><div class="c-rt">${r.toFixed(1)}% <span style="opacity:.65">/ ${btw.toFixed(1)}%</span></div></td>`);
      attachTip(td,`<div class="tip-k">${hq}</div><i class="tip-sw" style="background:${groupColor[g]||'#888'}"></i>${glabel(g)} · <b>${num(c)}</b> <span class="tip-k">건</span><br><span class="tip-k">본부내 ${r.toFixed(1)}% · 본부간 ${btw.toFixed(1)}% · 과다/과소 ${gap>=0?"+":""}${gap.toFixed(1)}%</span>`);
      tr.appendChild(td);
    });
    tr.appendChild(el(`<td class="rtot">${num(rowTot[hq])}</td>`));
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);
  // footer 전사합 (단말군 색 숫자)
  let foot='<tfoot><tr><td class="f-lbl">전사합</td>';
  groups.forEach(g=>{const c=colTot[g];foot+=`<td><div class="f-cnt" style="color:${groupColor[g]}">${num(c)}</div><div class="f-rt">${(c/grand*100).toFixed(1)}%</div></td>`;});
  foot+=`<td class="rtot">${num(grand)}</td></tr></tfoot>`;
  tbl.appendChild(el(foot));
  p.querySelector(".xtab-scroll").appendChild(tbl);
  m.appendChild(p);
}

// ── init ────────────────────────────────────────────────────
// (기준월/조회/SIMonly 전역바 제거 — 날짜는 전사개요 달력, SIMonly는 컨트롤바로 이동)

// ── 테마: 라이트/다크 토글 + localStorage persist ──────────────
const THEME_KEY="mds-theme";
function applyTheme(t){
  document.body.dataset.theme=t;
  // 버튼 아이콘: 현재 다크면 ☀️(라이트로), 라이트면 🌙(다크로)
  document.getElementById("themeBtn").textContent=(t==="dark")?"◑":"◐";
}
function initTheme(){
  // 기본은 라이트. 사용자가 토글로 바꾼 적 있으면 그 선호를 유지(localStorage).
  let t=localStorage.getItem(THEME_KEY);
  if(t!=="light"&&t!=="dark") t="light";
  applyTheme(t);
}
document.getElementById("themeBtn").onclick=()=>{
  const next=document.body.dataset.theme==="dark"?"light":"dark";
  localStorage.setItem(THEME_KEY,next);
  applyTheme(next);
  assignColors();           // 테마 팔레트로 단말군 색 재매핑
  if(STATE.brief||STATE.ov) render();
};
document.getElementById("helpBtn").onclick=()=>alert(
  "MNO 단말 판매 모니터링\n\n"+
  "· 기준월(YYYYMM) 입력 후 조회\n"+
  "· 4탭: 전사개요 / 본부별 / 본부 매트릭스 / 알림\n"+
  "· 과다/과소 지수 = 본부내비중 − 전사비중\n"+
  "· 우상단 ◐ 버튼으로 라이트·다크 전환 (자동 저장)\n"+
  "· 좌상단 상태칩 클릭 → 데이터 연결 4단계 진단\n\n"+
  "데이터 소스: obt_encore_max.device_sales_summary_daily3 (Polaris Gateway 메모리 캐시)");

// 상태칩 클릭 → 진단 드로어
const _chip=document.getElementById("srcChip");
_chip.classList.add("clickable"); _chip.onclick=openDiag;
document.getElementById("diagClose").onclick=closeDiag;
document.getElementById("diagBackdrop").onclick=closeDiag;
// 데이터 다시 불러오기 — /api/refresh(Gateway 재조회 + 캐시 교체) 후 진단·화면 갱신
// 재적재는 백그라운드 트리거만(수 분 소요 → 동기 대기 시 ALB 504). 완료 감지·화면 갱신은
// loadDiagnostics의 3초 폴링이 담당(loading→완료 전환 시 자동 loadStatus→loadPeriod).
document.getElementById("diagReload").onclick=async()=>{
  const b=document.getElementById("diagReload"); b.classList.add("spinning"); b.disabled=true;
  document.body.classList.add("loading-on");   // 갱신 중 배너 + 본문 흐림(잠정값 표시)
  const sub=document.getElementById("diagSub"); if(sub)sub.textContent="데이터 다시 불러오는 중… (수 분 소요, 완료되면 자동 갱신됩니다)";
  try{
    await fetch("/api/refresh",{method:"POST"}).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
    _wasLoading=true;            // 다음 폴링에서 loading→완료 전환을 감지해 자동 갱신하도록
    loadDiagnostics();           // 3초 폴링 시작 → 완료 시 배너 해제 + 데이터 자동 재집계
  }catch(e){
    if(sub)sub.textContent="재적재 트리거 실패: "+e.message;
    document.body.classList.remove("loading-on");
  }finally{ b.classList.remove("spinning"); b.disabled=false; }  // 버튼은 즉시 복구(대기 X)
};

initTheme();
// 적재 전엔 status가 최신일을 못 줄 수 있어, brief로 데이터 로드 보장 후 loadStatus 재호출 → anchor=데이터 max
// ── 뷰어별 워터마크(유출 억제) — 사내 SSO 헤더 기반 사번·이름·날짜, 대각선 타일(은은) ──
function initWatermark(){
  fetch('/api/me').then(r=>r.ok?r.json():null).then(me=>{
    if(!me) return;
    const parts=[me.sabun, me.name].filter(Boolean);
    if(!parts.length) return;                       // 신원 없으면(로컬/mock) 워터마크 생략
    const d=new Date(), p=n=>String(n).padStart(2,'0');
    const label=parts.join(' ')+'   '+d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
    const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const tw=360, th=210;
    const svg="<svg xmlns='http://www.w3.org/2000/svg' width='"+tw+"' height='"+th+"'>"
      +"<text x='12' y='"+(th*0.6)+"' transform='rotate(-24 "+(tw/2)+" "+(th/2)+")' "
      +"font-family='Pretendard,sans-serif' font-size='15' fill='rgba(130,130,150,0.09)'>"+esc(label)+"</text></svg>";
    let wm=document.getElementById('watermark');
    if(!wm){ wm=document.createElement('div'); wm.id='watermark'; document.body.appendChild(wm); }
    wm.style.cssText="position:fixed;inset:0;z-index:9998;pointer-events:none;background-repeat:repeat;"
      +"background-image:url(\"data:image/svg+xml,"+encodeURIComponent(svg)+"\")";
  }).catch(()=>{});
}
initWatermark();
(async()=>{await loadStatus();loadDiagnostics();await loadBrief();await loadStatus();applyChip(STATE.chip);})();
</script>
