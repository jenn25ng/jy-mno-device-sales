<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  /* в”Җв”Җ н…Ңл§Ҳ нҶ нҒ°: лқјмқҙнҠё кё°ліё + [data-theme="dark"] мҳӨлІ„лқјмқҙл“ң в”Җв”Җ */
  /* MNO SYNAPSE л””мһҗмқё нҶ нҒ° вҖ” лқјмқҙнҠё(near-white мӨ‘лҰҪ) */
  :root, [data-theme="light"]{
    color-scheme:light;
    --bg:#FAFBFD;--surface:#FFFFFF;--surface2:#F1F3F7;--border:#E2E6EF;--line2:#CDD3E0;
    --text:#16182B;--t1:#3C4060;--muted:#6E7499;--dim:#9AA0C0;
    --accent:#3617CE;--brand2:#5B3FE8;--accent-soft:#E7E2FB;--accent-rgb:54,23,206;
    --red:#EA002C;--red-soft:#FBE7E3;
    --orange:#B5821B;--orange-soft:#F8EFD8;--green:#0E9F6E;--green-soft:#E2F3EA;
    --warn:#F59E0B;--warn-soft:#FDF0D9;
    --blue:#5B3FE8;
    --shadow:0 1px 2px rgba(20,21,40,.05),0 10px 30px rgba(20,21,40,.07);
  }
  /* MNO SYNAPSE л””мһҗмқё нҶ нҒ° вҖ” лӢӨнҒ¬ */
  [data-theme="dark"]{
    color-scheme:dark;
    --bg:#0A0B16;--surface:#11132A;--surface2:#161A38;--border:#222845;--line2:#313863;
    --text:#EEEFFA;--t1:#C2C6E0;--muted:#8C92B8;--dim:#5E6388;
    --accent:#7E68FF;--brand2:#9E8CFF;--accent-soft:#231C58;--accent-rgb:126,104,255;
    --red:#FF5A5A;--red-soft:#2E1714;
    --orange:#E0A63A;--orange-soft:#2A2110;--green:#2FD79B;--green-soft:#0E2A1E;
    --warn:#FBBF24;--warn-soft:#2A1E06;
    --blue:#9E8CFF;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 14px 36px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Pretendard Variable',Pretendard,'Apple SD Gothic Neo',-apple-system,sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;transition:background .2s ease,color .2s ease}
  /* мҲҳм№ҳВ·л©”нғҖлҠ” JetBrains Mono (tabular-nums) */
  .kpi .v,.kpi-delta,.bar-row .val,.pcap,.dg-meta,.dg-err,.pbar-date,.heat td,
  td:not(:first-child){font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,monospace;font-variant-numeric:tabular-nums}

  /* н—ӨлҚ” м•„мқҙмҪҳ лІ„нҠј (н…Ңл§Ҳ нҶ кёҖ В· лҸ„мӣҖл§җ) */
  .icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  .nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .nav-mark{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--brand2));position:relative;margin-right:9px;flex-shrink:0}
  .nav-mark::after{content:'';position:absolute;inset:6px;border-radius:50%;background:var(--surface)}
  .nav-logo{font-size:14px;font-weight:800;color:var(--text);letter-spacing:-.2px}
  .nav-sep{color:var(--border);margin:0 10px}
  .nav-title{font-size:13px;color:var(--muted)}
  .nav-right{display:flex;align-items:center;gap:14px}
  .chip{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  .dot.ok{background:var(--green)}.dot.mock{background:var(--orange)}.dot.err{background:var(--red)}

  .tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;position:sticky;top:50px;z-index:99;overflow-x:auto}
  .tab{padding:11px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

  .ctrl{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:91px;z-index:98}
  .ctrl label{font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .ctrl input{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-weight:600;padding:5px 9px;width:90px}
  .btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .toggle{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}

  main{max-width:1200px;margin:0 auto;padding:14px 20px 60px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:18px}
  .panel h2{font-size:14px;margin:0 0 14px;font-weight:700}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
  .kpi .l{font-size:12px;color:var(--muted);margin-bottom:7px}
  .kpi .v{font-size:28px;font-weight:800}
  .kpi .u{font-size:12px;color:var(--dim);font-weight:400;margin-left:3px}

  .bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12px}
  .bar-row .name{width:120px;color:var(--muted);flex-shrink:0;text-align:right}
  .bar-track{flex:1;background:var(--surface2);border-radius:5px;height:18px;overflow:hidden}
  .bar-fill{height:100%;border-radius:5px}
  .bar-row .val{width:90px;text-align:right;font-variant-numeric:tabular-nums}

  .stack{display:flex;flex:1;min-width:0;height:20px;border-radius:5px;overflow:hidden;background:var(--surface2)}
  .stack-seg{height:100%;flex-shrink:0}
  .stack-row{display:flex;align-items:center;gap:10px;margin:6px 0}
  .stack-row .name{width:96px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-size:11px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:5px}
  .swatch{width:10px;height:10px;border-radius:2px;display:inline-block}

  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:7px 9px;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--muted);font-weight:600;position:sticky;top:0;background:var(--surface)}
  .table-wrap{overflow-x:auto}

  .hq-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .hq-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600}
  .hq-chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

  .oi-pos{color:var(--green);font-weight:700}
  .oi-neg{color:var(--red);font-weight:700}

  .alert{display:flex;gap:12px;align-items:center;padding:11px 14px;border-radius:9px;margin-bottom:8px;border:1px solid var(--border)}
  .alert .lv{font-size:11px;font-weight:800;padding:2px 9px;border-radius:5px;flex-shrink:0}
  .alert.urgent{background:var(--red-soft);border-color:var(--red)}.alert.urgent .lv{background:var(--red);color:#fff}
  .alert.warn{background:var(--warn-soft);border-color:var(--warn)}.alert.warn .lv{background:var(--warn);color:#241a00}
  .alert.info{background:var(--surface2);border-color:var(--border)}.alert.info .lv{background:var(--line2);color:var(--text)}
  .alert .msg{flex:1;font-size:13px}

  .heat td{text-align:center;font-variant-numeric:tabular-nums;border:1px solid var(--border)}
  .heat th{text-align:center}
  .heat td.hqname{text-align:left;color:var(--muted);font-weight:600;white-space:nowrap}

  .loading,.error{padding:50px;text-align:center;color:var(--muted)}
  #loadBanner{display:none;margin:0 0 4px;padding:9px 16px;border-radius:9px;font-size:13px;
    background:var(--warn-soft);color:#241a00;border:1px solid var(--warn)}
  [data-theme="dark"] #loadBanner{color:var(--warn)}
  #loadBanner b{font-weight:700}
  body.loading-on #loadBanner{display:block}
  body.loading-on main{opacity:.55;pointer-events:none;transition:opacity .2s}
  .error{color:var(--red)}
  .scaffold-note{font-size:11px;color:var(--dim);margin-top:6px}

  /* мӢңм җ+л№„көҗ м»ЁнҠёлЎӨ(Method 2) + KPI лҚёнғҖ */
  /* н•„н„°л°”: м№ҙл“ң X вҖ” н—ӨлҚ”мҷҖ мқҙм–ҙм§ҖлҠ” нқ°мғү н’ҖнҸӯ лқ  */
  .filterbar{background:var(--surface);border-bottom:1px solid var(--border)}
  .pbar{padding:10px 20px;display:flex;flex-wrap:nowrap;overflow-x:auto;align-items:center;gap:8px 14px}
  .pbar-divider{width:1px;align-self:stretch;background:var(--border);margin:2px 0}
  .pbar-grp{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .pbar-ic{font-size:15px}
  .pbar-lbl{font-size:10.5px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
  .pbar-date{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:600;padding:6px 9px}
  .pbar-tilde{color:var(--dim);font-weight:700;margin:0 4px}
  .dseg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-right:8px}
  .dseg-b{font-size:12px;padding:5px 11px;border:none;background:var(--surface);color:var(--muted);cursor:pointer;font-weight:600}
  .dseg-b+.dseg-b{border-left:1px solid var(--border)}
  .dseg-b.active{background:var(--accent-soft);color:var(--accent)}
  .pbar-sel{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:600;padding:6px 10px;cursor:pointer}
  .qchips{display:inline-flex;gap:4px;flex-wrap:wrap}
  .qchip{font-size:12px;font-weight:600;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:5px 11px;cursor:pointer;white-space:nowrap;transition:all .15s}
  .qchip:hover{border-color:var(--accent);color:var(--accent)}
  .qchip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:700}
  .qchip.rt{border-color:var(--line2);color:var(--accent)}
  .qchip.rt.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .pcap{font-size:12px;color:var(--muted);margin:2px 0 16px 2px}
  /* мЎ°нҡҢ/л№„көҗ кё°к°„ мәЎм…ҳ (м№©) */
  .qcap{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin:0 0 14px 2px;font-size:11px}
  .qcap-lbl{font-size:11px;font-weight:700;color:var(--dim);margin-right:1px}
  .qcap-seg{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:6px;background:var(--surface2)}
  .qcap-seg b{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11.5px;color:var(--text);font-variant-numeric:tabular-nums}
  .qcap-seg.cmp b{color:var(--muted);font-weight:600}
  .qtag{font-size:10px;font-weight:700;padding:0 6px;border-radius:5px;background:var(--accent-soft);color:var(--accent)}
  .qtag.muted{background:var(--line2);color:var(--text)}
  .qvs{font-size:10px;font-weight:800;color:var(--dim)}
  .kpi-delta{display:inline-flex;white-space:nowrap;font-size:11px;font-weight:700;margin-top:8px;padding:3px 9px;border-radius:6px}
  .kpi-delta.up{color:var(--green);background:var(--green-soft)} .kpi-delta.down{color:var(--red);background:var(--red-soft)}
  .kpi-delta.flat{color:var(--dim);background:var(--surface2);font-weight:600}
  /* мқјлі„ м¶”мқҙ (л§үлҢҖ) */
  .trend{display:flex;align-items:flex-end;gap:2px;height:120px;overflow-x:auto;padding-top:6px}
  .trend-col{flex:1;min-width:9px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;cursor:default}
  .trend-bar{width:72%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;transition:height .2s}
  .trend-col:hover .trend-bar{background:var(--brand2)}
  .trend-x{font-size:9px;color:var(--dim);margin-top:5px;font-family:'JetBrains Mono',monospace}
  .trend-cap{font-size:11px;color:var(--dim);margin-top:8px;font-family:'JetBrains Mono',monospace}

  /* нғӯ л°°м§Җ(м•ҢлҰј кұҙмҲҳ) */
  .tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 5px;margin-left:6px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;vertical-align:middle;line-height:1}
  /* KPI вҖ” Top3 лһӯнҒ¬(лӢЁл§җкө° мғү) + м„ңлёҢлқјмқё */
  .kpi-rank{display:flex;align-items:center;gap:6px}
  .kpi-rank .rk{font-family:'JetBrains Mono',monospace;font-weight:800}
  .kpi-rank .rn{font-weight:700}
  .kpi-sub{font-size:11.5px;color:var(--muted);margin-top:5px}
  /* нҢЁл„җ н—ӨлҚ”(м ңлӘ© + мҡ°мёЎ нҶ кёҖ) */
  .panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .panel-hd h2{margin:0}
  .sim-toggle{font-size:11px}
  /* лҸ„л„ӣ(лӢЁл§җкө°лі„ л№„мӨ‘) */
  .donut-body{display:flex;align-items:center;justify-content:center;gap:26px}
  .donut{width:205px;height:205px;flex-shrink:0}
  .donut-total{text-anchor:middle;font:800 6.2px 'JetBrains Mono',monospace;fill:var(--text)}
  .donut-lbl{text-anchor:middle;font:400 2.7px 'Pretendard Variable',sans-serif;fill:var(--dim)}
  .donut-legend{flex:0 0 235px;display:flex;flex-direction:column;gap:4px;min-width:0}
  .dlg-row{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;user-select:none;padding:3px 7px;margin:0 -7px;border-radius:6px;transition:background .12s,opacity .15s}
  .dlg-row:hover{background:var(--surface2)}
  .dlg-row.off{opacity:.4}
  .dlg-row.off .dlg-name{text-decoration:line-through}
  .dlg-name{color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dlg-cnt{font-family:'JetBrains Mono',monospace;color:var(--dim);font-variant-numeric:tabular-nums;margin-right:9px;white-space:nowrap}
  .dlg-val{font-family:'JetBrains Mono',monospace;color:var(--muted);font-variant-numeric:tabular-nums;min-width:44px;text-align:right}
  /* м• лӢҲл©”мқҙм…ҳ вҖ” м—ҙлҰј/н•„н„°/нҶ кёҖ мӢң мһ¬мғқ. CSS keyframesлқј rAF л¶Ҳн•„мҡ”, лҜёмһ¬мғқ мӢңм—җлҸ„ мөңмў…мғҒнғң(ліҙмһ„) мң м§Җ */
  @keyframes donutIn{from{opacity:0;transform:rotate(-80deg) scale(.7)}to{opacity:1;transform:none}}
  .donut{animation:donutIn .6s cubic-bezier(.22,.68,.24,1)}
  @keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  .vcol{transform-origin:bottom;animation:barGrow .55s cubic-bezier(.22,.68,.24,1) both}
  @keyframes barX{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .bar-fill,.cmp-bar{transform-origin:left;animation:barX .55s cubic-bezier(.22,.68,.24,1)}
  .bar-row{border-radius:6px;transition:background .12s}
  .bar-row:hover{background:var(--surface2)}
  @media (prefers-reduced-motion:reduce){.donut,.vcol,.bar-fill,.cmp-bar{animation:none}}
  /* лЎңм»¬ ліёл¶Җ н•„н„° л°” */
  .localbar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:16px}
  .localbar-lbl{font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px}
  .hq-chip{transition:background .12s,border-color .12s,color .12s}
  .hq-chip:hover{border-color:var(--accent);color:var(--text)}
  .hq-chip .cnt{font-family:'JetBrains Mono',monospace;color:var(--dim);font-weight:600;margin-left:6px;font-variant-numeric:tabular-nums}
  .hq-chip.active .cnt{color:var(--accent)}
  /* м „мӮ¬ vs ліёл¶Җ л№„мӨ‘ л№„көҗ л§үлҢҖ */
  .cmp-legend{display:flex;gap:16px;font-size:11px;color:var(--muted);margin-bottom:12px}
  .cmp-legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .cmp-row{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:12px}
  .cmp-name{width:84px;flex-shrink:0;color:var(--t1);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cmp-bars{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
  .cmp-bar{height:9px;border-radius:4px;min-width:2px}
  .cmp-val{width:110px;text-align:right;font-variant-numeric:tabular-nums;color:var(--muted);flex-shrink:0}
  .pcap2{font-size:12px;color:var(--muted);margin:-8px 0 12px}
  .drill-chips{display:flex;gap:6px;flex-wrap:wrap;margin:-2px 0 14px}
  .drill-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer;font-weight:600;transition:all .12s}
  .drill-chip .swatch{width:8px;height:8px;border-radius:2px}
  .drill-chip:hover{border-color:var(--accent);color:var(--text)}
  .drill-chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .kpi .v.vname{font-size:18px}
  /* л№„көҗ н•ҳмқҙлқјмқҙнҠё */
  .hl-cap{font-size:11.5px;color:var(--muted)}
  .hl-wrap{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
  .hl-badge{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);font-size:12px}
  .hl-badge.up{border-color:color-mix(in srgb,var(--green) 45%,var(--border));background:var(--green-soft)}

function hqColor(i){const p=document.body.dataset.theme==="dark"?HQPAL_DARK:HQPAL_LIGHT;return p[i%p.length];}
let _groupOrder=[];
function assignColors(groups){        // лӢЁл§җкө°вҶ’мғү л§Өн•‘(н…Ңл§Ҳлі„ кі м •мғү, лҜём§Җк°’мқҖ fallback)
  if(groups)_groupOrder=groups;
  const dark=document.body.dataset.theme==="dark";
  const map=dark?GCOLOR_DARK:GCOLOR_LIGHT, fb=dark?FALLBACK_DARK:FALLBACK_LIGHT;
  let fi=0;
  (_groupOrder||[]).forEach(g=>{ groupColor[g]= map[g] || fb[(fi++)%fb.length]; });
}

async function loadStatus(){
  try{
    const s=await fetch("/api/status").then(r=>r.json());
    STATE.dataMin=s.earliest_exec_dt||null;          // лҚ°мқҙн„° мӢӨм ң лІ”мң„(лӢ¬л Ҙ м ңн•ң)
    STATE.dataMax=s.latest_exec_dt||null;
    STATE.anchor=s.latest_exec_dt||STATE.anchor;     // кё°мӨҖмқј кё°ліё = лҚ°мқҙн„° мөңмӢ мқј
  }catch(e){/* statusлҠ” ліҙмЎ° вҖ” chipмқҖ diagnosticsк°Җ лӢҙлӢ№ */}
  if(!STATE.anchor){                                // fallback: лёҢлқјмҡ°м Җ м–ҙм ң
    const y=new Date(); y.setDate(y.getDate()-1); STATE.anchor=_ymd(y);
  }
}

// м „мӮ¬ к°ңмҡ” мӢңм җ+л№„көҗ overview лЎңл“ң (/api/overview)
async function loadOverview(){
  if(STATE.tab==="overview") render();             // м»ЁнҠёлЎӨ мҰүмӢң л°ҳмҳҒ(+лЎңл”©)
  try{
    const qs=new URLSearchParams();
    if(STATE.rangeStart)qs.set("period_start",STATE.rangeStart);
    if(STATE.rangeEnd)qs.set("period_end",STATE.rangeEnd);
    _applyCompareQS(qs);
    if(STATE.scrbType&&STATE.scrbType!=="м „мІҙ")qs.set("scrb_type",STATE.scrbType);
    if(STATE.channel&&STATE.channel!=="м „мІҙ")qs.set("channel",STATE.channel);
    if(STATE.agreeType&&STATE.agreeType!=="м „мІҙ")qs.set("agree_type",STATE.agreeType);
    if(STATE.b2cOnly)qs.set("b2c_only","1");
    const ov=await fetch("/api/overview?"+qs.toString()).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
    STATE.ov=ov;
    assignColors(ov.meta.device_groups);
  }catch(e){ STATE.ov=null; console.error("overview load мӢӨнҢЁ",e); }
  if(STATE.tab==="overview") render();
}

let _diagPoll=null;
const DIAG_LABEL={ok:"м •мғҒ",loading:"лЎңл“ңмӨ‘",failed:"мӢӨнҢЁ"};
const DIAG_ICON={ok:"вң“",loading:"вҸі",failed:"вң—"};
let _wasLoading=false;
async function loadDiagnostics(){
  try{
    const d=await fetch("/api/diagnostics").then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
    STATE.diag=d; updateChip(d); renderDiagStages(d);
    const nowLoading=(d.overall==="loading");                 // м Ғмһ¬ м§„н–ү мӨ‘ вҶ’ л°°л„Ҳ+ліёл¬ё нқҗлҰј
    document.body.classList.toggle("loading-on", nowLoading);
    if(_wasLoading && !nowLoading){                            // м Ғмһ¬ мҷ„лЈҢ мҲңк°„ вҶ’ мөңмӢ  лҚ°мқҙн„°лЎң мһҗлҸҷ к°ұмӢ 
      loadStatus().then(()=>loadPeriod());
    }
    _wasLoading=nowLoading;
    if(_diagPoll){clearTimeout(_diagPoll);_diagPoll=null;}
    if(nowLoading) _diagPoll=setTimeout(loadDiagnostics,3000); // м Ғмһ¬ мӨ‘мқҙл©ҙ мһҗлҸҷ мһ¬нҷ•мқё
  }catch(e){
    const chip=document.getElementById("srcChip");
    chip.classList.remove("dg-ok","dg-loading"); chip.classList.add("dg-fail");
    document.getElementById("srcText").textContent="вң— мғҒнғң мҳӨлҘҳ";
  }
}
const DG_GLYPH={ok:"вң“",failed:"вң•",skipped:"вҖ“",pending:"в—Ӣ"};
const DG_STTEXT={ok:"м •мғҒ",failed:"мӢӨнҢЁ",in_progress:"нҷ•мқё мӨ‘вҖҰ",pending:"лҢҖкё°",skipped:"н•ҙлӢ№ м—ҶмқҢ"};
function updateChip(d){
  const chip=document.getElementById("srcChip");
  chip.classList.remove("dg-ok","dg-loading","dg-fail");
  chip.classList.add(d.overall==="ok"?"dg-ok":d.overall==="failed"?"dg-fail":"dg-loading");
  document.getElementById("srcText").textContent=`${DIAG_ICON[d.overall]||"В·"} ${d.mock?"MOCK":"Gateway"} В· ${DIAG_LABEL[d.overall]||d.overall}`;
}
function _stageIcon(status){
  return status==="in_progress" ? '<div class="dg-spin"></div>'
    : `<div class="dg-ic ${status}">${DG_GLYPH[status]||"В·"}</div>`;
}
function renderDiagStages(d){
  document.getElementById("diagSub").textContent=`${d.mock?"MOCK лҚ°мқҙн„°":"Gateway"} В· ${d.source_table||""}`;
  const wrap=document.getElementById("diagStages"); wrap.innerHTML="";
  let mem=null;
  (d.stages||[]).forEach(s=>{
    if(s.key==="memory_cache") mem=s;
    const failed=s.status==="failed";
    const st=el(`<div class="dg-stage${failed?" open":""}"><div class="dg-row">${_stageIcon(s.status)}<div class="dg-main"><div class="dg-label"></div><div class="dg-st ${s.status}"></div></div><span class="dg-chev">в–¶</span></div><div class="dg-detail"><div class="dg-detail-in"></div></div></div>`);
    st.querySelector(".dg-label").textContent=s.label;
    st.querySelector(".dg-st").textContent=DG_STTEXT[s.status]||s.status;
    const din=st.querySelector(".dg-detail-in");
    if(failed){
      const err=el('<div class="dg-err"></div>'); err.textContent=s.detail||"мӢӨнҢЁ"; din.appendChild(err);
      if(s.missing&&s.missing.length){const m=el('<div style="margin-top:8px"></div>');m.textContent="лҲ„лқҪ м»¬лҹј: "+s.missing.join(", ");din.appendChild(m);}
    }else{
      const p=el('<div></div>'); p.textContent=s.detail||""; din.appendChild(p);
      if(s.source_table&&s.key==="env_config"){const t=el('<div style="margin-top:5px;color:var(--dim)"></div>');t.textContent="н…Ңмқҙлё”: "+s.source_table;din.appendChild(t);}
    }
    st.querySelector(".dg-row").onclick=()=>st.classList.toggle("open");
    wrap.appendChild(st);
  });
  const meta=document.getElementById("diagMeta");
  meta.textContent=(mem&&mem.rows!=null)
    ? `н–ү ${num(mem.rows)} В· кё°к°„ ${mem.min_exec_dt||"-"}~${mem.max_exec_dt||"-"} (${mem.months||0}к°ңмӣ”) В· м Ғмһ¬ ${mem.loaded_at||"-"}`
    : "";
}

async function loadBrief(){
  // м „ нғӯ кіөнҶө кё°к°„(rangeStart~rangeEnd) кё°мӨҖ вҖ” кё°к°„ л°”кҫёл©ҙ лӘЁл“  нғӯ лҚ°мқҙн„° л°ҳмҳҒ(м „м—ӯ)
  const monthTab=(STATE.tab!=="overview");
  if(monthTab && !STATE.brief) document.getElementById("main").innerHTML='<div class="loading">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>';
  try{
    const bq=new URLSearchParams();
    if(STATE.rangeStart)bq.set("period_start",STATE.rangeStart);
    if(STATE.rangeEnd)bq.set("period_end",STATE.rangeEnd);
    if(STATE.scrbType&&STATE.scrbType!=="м „мІҙ")bq.set("scrb_type",STATE.scrbType);
    if(STATE.channel&&STATE.channel!=="м „мІҙ")bq.set("channel",STATE.channel);
    if(STATE.agreeType&&STATE.agreeType!=="м „мІҙ")bq.set("agree_type",STATE.agreeType);
    if(STATE.b2cOnly)bq.set("b2c_only","1");
    _applyCompareQS(bq);                                     // м „м—ӯ л№„көҗ вҶ’ ліёл¶Җлі„ deltaВ·movers
    const url="/api/brief"+(bq.toString()?"?"+bq.toString():"");
    const b=await fetch(url).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
    STATE.brief=b;
    assignColors(b.meta.device_groups);
    if(monthTab) render();   // overview нғӯмқҙл©ҙ loadOverviewк°Җ л ҢлҚ” лӢҙлӢ№
  }catch(e){
    if(monthTab) document.getElementById("main").innerHTML=`<div class="error">мЎ°нҡҢ мӢӨнҢЁ: ${e.message}</div>`;
  }
}

// м§Ғм ‘м„Өм • л№„көҗкё°к°„ кё°ліёк°’ = л©”мқё кё°к°„ л°”лЎң м•һмқҳ к°ҷмқҖ кёёмқҙ кө¬к°„
function _defaultCmpWindow(){
  const s=STATE.rangeStart, e=STATE.rangeEnd;
  if(!s||!e) return [null,null];
  const ds=new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));
  const de=new Date(+e.slice(0,4),+e.slice(4,6)-1,+e.slice(6,8));
  const len=Math.round((de-ds)/86400000);
  const ce=new Date(ds); ce.setDate(ce.getDate()-1);      // л©”мқё мӢңмһ‘ н•ҳлЈЁ м „
  const cs=new Date(ce); cs.setDate(cs.getDate()-len);
  return [_ymd(cs),_ymd(ce)];
}
// м „м—ӯ л№„көҗ нҢҢлқјлҜён„°лҘј мҝјлҰ¬мҠӨнҠёл§Ғм—җ м¶”к°Җ (overviewВ·brief кіөнҶө)
function _applyCompareQS(qs){
  const ct=STATE.compareTo||"none";
  if(ct==="custom"){
    if(STATE.compareStart&&STATE.compareEnd){
      qs.set("compare_to","custom");
      qs.set("compare_start",STATE.compareStart); qs.set("compare_end",STATE.compareEnd);
    }else{ qs.set("compare_to","none"); }                   // м§Ғм ‘м„Өм •мқёлҚ° кё°к°„ лҜёмһ…л Ҙ вҶ’ л№„көҗ м—ҶмқҢ
  }else{ qs.set("compare_to",ct); }
}

function renderTabs(){
  const t=document.getElementById("tabs");t.innerHTML="";
  TABS.forEach(tab=>{
    const d=el(`<div class="tab ${tab.id===STATE.tab?"active":""}"></div>`);
    d.appendChild(document.createTextNode(tab.label));
    if(tab.id==="alerts"&&STATE.brief){
      const n=(STATE.brief.alerts||[]).filter(a=>a.level==="urgent"||a.level==="warn").length;
      if(n>0)d.appendChild(el(`<span class="tab-badge">${n}</span>`));
    }
    d.onclick=()=>{STATE.tab=tab.id;render();};
    t.appendChild(d);
  });
}

}

// кіөнҶө: к°ҖлЎң л§үлҢҖ
function barList(items,maxVal,colorFn,labelFn,valFn){
  const wrap=el('<div></div>');
  items.forEach(it=>{
    const pct=maxVal?Math.max(2,it._v/maxVal*100):0;
    const row=el(`<div class="bar-row"><div class="name">${labelFn(it)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colorFn(it)}"></div></div>
      <div class="val">${valFn(it)}</div></div>`);
    attachTip(row,`<i class="tip-sw" style="background:${colorFn(it)}"></i>${labelFn(it)} В· <b>${valFn(it)}</b>`);
    wrap.appendChild(row);
  });
  return wrap;
}

// в”Җв”Җ нғӯ 1: м „мӮ¬ к°ңмҡ” (мӢңм җ + л№„көҗ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function tabOverview(m){
  if(!STATE.ov){ m.appendChild(el('<div class="loading">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>')); return; }
  const cur=STATE.ov.current, delta=STATE.ov.delta, meta=STATE.ov.meta;
  const hqs=meta.hqs||[];
  const typeLabel=(meta.scrb_type&&meta.scrb_type!=="м „мІҙ")?meta.scrb_type:"";
  let groups=cur.by_group.slice();
  if(!STATE.simOn)groups=groups.filter(g=>!g.sim_only);
  const total=groups.reduce((s,g)=>s+g.count,0);

  // в‘  KPI вҖ” мҙқ нҢҗл§Ө + Top3(лӢЁл§җкө° мғү лһӯнҒ¬)
  m.appendChild(kpiOverview(groups,total,typeLabel,delta));
  // в‘ -b л№„көҗ н•ҳмқҙлқјмқҙнҠё (л№„көҗвү м—ҶмқҢмқј л•Ң, мӢңмһҘлҢҖл№„ мғҒлҢҖ кёүліҖ н•ӯлӘ©)
  if(delta){const hp=highlightPanel(cur,delta,meta); if(hp)m.appendChild(hp);}
  const gOrdered=sortByG(groups,g=>g.group);   // кі м • мҲңм„ң(м „мӮ¬к°ңмҡ” лӮҳм—ҙмҡ©). KPI Top3лҠ” нҢҗл§ӨмҲңмң„лқј groups(кұҙмҲҳмҲң) мң м§Җ
  // в‘Ў лҸ„л„ӣ(лӢЁл§җкө°лі„ л№„мӨ‘) + ліёл¶Җлі„ 100% м„ёлЎң лҲ„м Ғ
  const grid=el('<div class="grid-2"></div>');
  grid.appendChild(donutPanel(sortByG(cur.by_group.slice(),g=>g.group),0));   // лҸ„л„ӣм—” м „мІҙ(SIMonly нҸ¬н•Ё) вҶ’ OFF мӢң "вҖ”" н‘ңмӢң
  grid.appendChild(vstackPanel(cur.hq_group_stacked,gOrdered.map(g=>g.group),hqs));
  m.appendChild(grid);
  // в‘ў лӢЁл§җкө° Г— мқјмһҗлі„ м¶”мқҙ (кәҫмқҖм„ ) вҖ” л§Ё н•ҳлӢЁ
  m.appendChild(dailyGroupLineChart(cur.daily_group_series, gOrdered.map(g=>g.group)));
}

function kpiOverview(groups,total,typeLabel,delta){
  const grid=el('<div class="kpi-grid"></div>');
  const c1=el('<div class="kpi anchor"><div class="l"></div><div class="v"></div><div class="kpi-sub"></div></div>');
  c1.querySelector(".l").textContent=`мҙқ ${typeLabel?typeLabel+" ":""}нҢҗл§Ө`;
  c1.querySelector(".v").innerHTML=`${num(total)}<span class="u">кұҙ</span>`;
  c1.querySelector(".kpi-sub").textContent=CHIP_LABEL[STATE.chip]||"м„ нғқ кё°к°„";
  if(delta&&delta.total_sales)c1.appendChild(deltaChip(delta.total_sales));
  grid.appendChild(c1);
  groups.slice(0,3).forEach((g,i)=>{
    const col=groupColor[g.group]||"var(--accent)";
    const card=el('<div class="kpi"><div class="l kpi-rank"><span class="rk"></span><span class="rn"></span></div><div class="v"></div><div class="kpi-sub"></div></div>');
    const rk=card.querySelector(".rk");rk.textContent=`#${i+1}`;rk.style.color=col;
    const rn=card.querySelector(".rn");rn.textContent=glabel(g.group);rn.style.color=col;
    card.querySelector(".v").innerHTML=`${num(g.count)}<span class="u">кұҙ</span>`;
    card.querySelector(".kpi-sub").textContent=`м „мӮ¬ ${g.share}%`;
    if(delta&&delta.by_group&&delta.by_group[g.group])card.appendChild(deltaChip(delta.by_group[g.group]));
    grid.appendChild(card);
  });
  return grid;
}
function deltaChip(d){
  const e=el('<div class="kpi-delta"></div>');
  if(d.pct!=null){const up=d.abs>0,flat=d.abs===0;
    e.className="kpi-delta "+(flat?"flat":up?"up":"down");
    e.textContent=`${flat?"вҖ“":up?"в–І":"в–ј"} ${up?"+":""}${d.pct}% (${d.abs>0?"+":""}${num(d.abs)}кұҙ)`;
  }else{e.className="kpi-delta flat";e.textContent="л№„көҗ м—ҶмқҢ";}
  return e;
}

// в”Җв”Җ м»Өм„ң л”°лқјлӢӨлӢҲлҠ” м»ӨмҠӨн…Җ нҲҙнҢҒ в”Җв”Җ
let _tip=null;
function _tipEl(){ if(!_tip){_tip=el('<div id="tip"></div>');document.body.appendChild(_tip);} return _tip; }
function moveTip(x,y){ const t=_tipEl(),pad=14; let nx=x+pad,ny=y+pad;
  if(nx+t.offsetWidth>innerWidth-8)nx=x-t.offsetWidth-pad;
  if(ny+t.offsetHeight>innerHeight-8)ny=y-t.offsetHeight-pad;
  t.style.left=Math.max(8,nx)+"px"; t.style.top=Math.max(8,ny)+"px"; }
function hideTip(){ if(_tip)_tip.classList.remove("on"); }
function attachTip(node,html){
  node.addEventListener("mouseenter",e=>{const t=_tipEl();t.innerHTML=html;t.classList.add("on");moveTip(e.clientX,e.clientY);});
  node.addEventListener("mousemove",e=>moveTip(e.clientX,e.clientY));
  node.addEventListener("mouseleave",hideTip);
}
// нҲҙнҢҒ ліёл¬ё: мғү мҠӨмҷҖм№ҳ + лӢЁл§җкө° В· кұҙмҲҳ В· л№„мӨ‘(+м„ нғқ мғҒлӢЁ лқјлІЁ)
function tipRow(group,count,share,head){
  return (head?`<div class="tip-k">${head}</div>`:"")
    +`<i class="tip-sw" style="background:${groupColor[group]||'#888'}"></i>${glabel(group)} В· <b>${num(count)}</b> `
    +`<span class="tip-k">кұҙ${share!=null?` В· ${share}%`:""}</span>`;
}

// л№„көҗ н•ҳмқҙлқјмқҙнҠё вҖ” мӢңмһҘ(м „мІҙ) мҰқк°җлҘ  лҢҖл№„ мғҒнҡҢ/н•ҳнҡҢк°Җ нҒ° н•ӯлӘ©(лӢЁл§җкө°/ліёл¶Җ/к°Җмһ…мң нҳ•)
function highlightPanel(cur,delta,meta){
  const totalPct=(delta.total_sales&&delta.total_sales.pct!=null)?delta.total_sales.pct:0;
  const curTotal=cur.kpis.total_sales||1;
  const MINBASE=Math.max(5,curTotal*0.01), GAP=8;   // лҜём„ёВ·мҙҲм ҖкұҙмҲҳ л…ёмқҙмҰҲ м–өм ң
  const cand=[];
  const push=(dim,label,base,d)=>{ if(!d||d.pct==null||base<MINBASE)return;
    const gap=d.pct-totalPct; if(Math.abs(gap)<GAP)return; cand.push({dim,label,pct:d.pct,gap}); };
  cur.by_group.forEach(g=>{ if(!STATE.simOn&&g.sim_only)return; push("лӢЁл§җкө°",glabel(g.group),g.count,delta.by_group&&delta.by_group[g.group]); });
  (cur.hq_group_stacked||[]).forEach(h=>push("ліёл¶Җ",h.hq,h.total,delta.by_hq&&delta.by_hq[h.hq]));
  if((meta.scrb_type||"м „мІҙ")==="м „мІҙ")(cur.by_scrb_type||[]).forEach(s=>push("к°Җмһ…мң нҳ•",s.scrb_type,s.count,delta.by_scrb&&delta.by_scrb[s.scrb_type]));
  cand.sort((a,b)=>Math.abs(b.gap)-Math.abs(a.gap));
  const panel=el('<div class="panel"><div class="panel-hd"><h2>л№„көҗ н•ҳмқҙлқјмқҙнҠё</h2></div></div>');
  panel.querySelector(".panel-hd").appendChild(el(`<span class="hl-cap">мӢңмһҘ(м „мІҙ) ${totalPct>=0?"+":""}${totalPct}% лҢҖл№„ В· мғҒнҡҢв–І/н•ҳнҡҢв–ј</span>`));
  if(!cand.length){ panel.appendChild(el('<div class="hl-empty">л№„көҗкё°к°„ лҢҖл№„ нҠ№мқҙ ліҖнҷ” м—ҶмқҢ</div>')); return panel; }
  const wrap=el('<div class="hl-wrap"></div>');
  cand.slice(0,6).forEach(c=>{const up=c.gap>0;
    wrap.appendChild(el(`<div class="hl-badge ${up?"up":"down"}"><span class="hl-dim">${c.dim}</span><span class="hl-lb">${c.label}</span><span class="hl-pct">${up?"в–І":"в–ј"} ${c.pct>=0?"+":""}${c.pct}%</span><span class="hl-gap">мӢңмһҘжҜ” ${c.gap>=0?"+":""}${c.gap.toFixed(1)}%</span></div>`));
  });
  panel.appendChild(wrap);
  return panel;
}

// ліёл¶Җлі„ л№„көҗ н•ҳмқҙлқјмқҙнҠё (E) вҖ” м „м—ӯ л№„көҗ нҷңм„ұ мӢң м„ нғқ ліёл¶Җмқҳ мҙқ мҰқк°җ + кёүмҰқ/кёүк°җ лӢЁл§җкө°
function hqCompareHighlight(hq){
  const lbl=(STATE.brief&&STATE.brief.meta&&STATE.brief.meta.compare_label)||"л№„көҗ";
  const panel=el('<div class="panel"><div class="panel-hd"><h2>л№„көҗ н•ҳмқҙлқјмқҙнҠё</h2></div></div>');
  panel.querySelector(".panel-hd").appendChild(el(`<span class="hl-cap">${lbl} лҢҖл№„ В· ліёл¶Җ мҰқк°җ</span>`));
  const wrap=el('<div class="hl-wrap"></div>');
  const td=hq.total_delta||{abs:0,pct:null}, up=hq.movers.up, dn=hq.movers.down;
  const tc=td.abs>0?"up":(td.abs<0?"down":"");
  wrap.appendChild(el(`<div class="hl-badge ${tc}"><span class="hl-dim">ліёл¶Җ мҙқ нҢҗл§Ө</span><span class="hl-lb">${hq.hq}</span><span class="hl-pct">${td.abs>=0?"в–І +":"в–ј "}${num(td.abs)}кұҙ${td.pct!=null?` (${td.pct>=0?"+":""}${td.pct}%)`:""}</span></div>`));
  wrap.appendChild(el(`<div class="hl-badge up"><span class="hl-dim">мөңлҢҖ кёүмҰқ</span><span class="hl-lb">${glabel(up.group)}</span><span class="hl-pct">в–І +${num(up.abs)}кұҙ</span></div>`));
  wrap.appendChild(el(`<div class="hl-badge down"><span class="hl-dim">мөңлҢҖ кёүк°җ</span><span class="hl-lb">${glabel(dn.group)}</span><span class="hl-pct">в–ј ${num(dn.abs)}кұҙ</span></div>`));
  panel.appendChild(wrap);
  return panel;
}

// лҸ„л„ӣ(лӢЁл§җкө°лі„ л№„мӨ‘) вҖ” SVG. мӣҗл‘ҳл ҲвүҲ100(r=15.9155) нҠёлҰӯмңјлЎң dasharray=л№„мӨ‘%
function donutPanel(groups,total,title){
  const panel=el('<div class="panel"><div class="panel-hd"><h2></h2></div></div>');
  panel.querySelector("h2").textContent=title||"лӢЁл§җкө°лі„ л№„мӨ‘";
  const body=el('<div class="donut-body"></div>');
  panel.appendChild(body);
  const avail=groups.filter(g=>g.count>0);
  // мҲЁк№Җ = лІ”лЎҖ нҒҙлҰӯ нҶ кёҖ OR (SIMonlyмқёлҚ° м „м—ӯ SIMonly OFF) вҶ’ лІ”лЎҖм—” лӮЁкё°кі  "вҖ”"лЎң н‘ңмӢң
  const isHidden=g=> STATE.donutHidden.has(g) || (g==="SIMonly" && !STATE.simOn);
  function draw(){                    // лІ”лЎҖ нҒҙлҰӯ мӢң лҸ„л„ӣл§Ң мһ¬кі„мӮ°В·мһ¬м• лӢҲл©”мқҙм…ҳ
    body.innerHTML="";
    const vis=avail.filter(g=>!isHidden(g.group));
    const visTot=vis.reduce((s,g)=>s+g.count,0)||1;
    body.appendChild(donutSvg(vis,visTot));
    body.appendChild(donutLegend(avail,visTot,draw,isHidden));
  }
  draw();
  return panel;
}
// vis=ліҙмқҙлҠ” кө°л§Ң, total=ліҙмқҙлҠ” н•©. л№„мӨ‘мқҖ ліҙмқҙлҠ” н•© кё°мӨҖмңјлЎң мһ¬кі„мӮ°(мҲЁкё°л©ҙ лӮҳлЁём§Җк°Җ мұ„мӣҖ)
function donutSvg(vis,total){
  const R=15.91549, t=total||1; let cum=0;
  const arcs=vis.map((g,i)=>{
    const sh=g.count/t*100, off=25-cum; cum+=sh;
    return `<circle data-i="${i}" cx="21" cy="21" r="${R}" fill="none" stroke="${groupColor[g.group]||'#888'}" stroke-width="5.4" stroke-dasharray="${sh.toFixed(3)} ${(100-sh).toFixed(3)}" stroke-dashoffset="${off.toFixed(3)}"></circle>`;
  }).join("");
  const svg=el(`<svg class="donut" viewBox="0 0 42 42"><circle cx="21" cy="21" r="${R}" fill="none" stroke="var(--surface2)" stroke-width="5.4"></circle>${arcs}<text x="21" y="20" class="donut-total">${num(total)}</text><text x="21" y="24.6" class="donut-lbl">кұҙ</text></svg>`);
  svg.querySelectorAll("circle[data-i]").forEach(c=>{const g=vis[+c.dataset.i];attachTip(c,tipRow(g.group,g.count,(g.count/t*100).toFixed(1)));});
  return svg;
}
// avail=(count>0)мқё м „мІҙ кө°. мҲЁкёҙ кө°мқҖ м·ЁмҶҢм„ В·"вҖ”". SIMonly н–ү нҒҙлҰӯ=м „м—ӯ нҶ кёҖ, к·ё мҷё=лҸ„л„ӣ-лЎңм»¬ мҲЁк№Җ
function donutLegend(avail,visTot,onToggle,isHidden){
  const lg=el('<div class="donut-legend"></div>');
  avail.forEach(g=>{
    const off=isHidden(g.group);
    const row=el(`<div class="dlg-row${off?" off":""}"><i class="swatch"></i><span class="dlg-name"></span><span class="dlg-cnt"></span><span class="dlg-val"></span></div>`);
    row.querySelector(".swatch").style.background=groupColor[g.group];
    row.querySelector(".dlg-name").textContent=glabel(g.group);
    row.querySelector(".dlg-cnt").textContent=`${num(g.count)}кұҙ`;
    row.querySelector(".dlg-val").textContent=off?"вҖ”":`${(g.count/visTot*100).toFixed(1)}%`;
    row.onclick=()=>{
      if(g.group==="SIMonly"){ STATE.simOn=!STATE.simOn; render(); }   // м „м—ӯ(лӘЁл“  нғӯ лҸҷкё°)
      else { STATE.donutHidden.has(g.group)?STATE.donutHidden.delete(g.group):STATE.donutHidden.add(g.group); onToggle(); }
    };
    lg.appendChild(row);
  });
  return lg;
}

// ліёл¶Җлі„ лӢЁл§җкө° 100% м„ёлЎң лҲ„м Ғ (order[0]=мөңлҢҖ лӢЁл§җкө°мқҙ н•ҳлӢЁ = column-reverse)
function vstackPanel(stacked,order,hqs){
  const panel=el('<div class="panel"><h2>ліёл¶Җлі„ лӢЁл§җкө° кө¬м„ұ (100% лҲ„м Ғ)</h2></div>');
  panel.appendChild(legend(order));
  const chart=el('<div class="vchart"></div>');
  const yax=el('<div class="vaxis"></div>');
  [100,80,60,40,20,0].forEach(v=>yax.appendChild(el(`<div>${v}%</div>`)));
  chart.appendChild(yax);
  const plot=el('<div class="vplot"></div>');
  const inc=order.filter(g=>STATE.simOn||g!=="SIMonly");
  hqs.forEach((hq,ci)=>{
    const s=((stacked.find(x=>x.hq===hq)||{}).groups)||{};
    const tot=inc.reduce((a,g)=>a+(s[g]||0),0)||1;
    const wrap=el('<div class="vcol-wrap"></div>');
    const col=el('<div class="vcol"></div>');
    col.style.animationDelay=(ci*45)+"ms";       // мҷјвҶ’мҳӨ мҲңм°Ё мҠӨнғңкұ°
    inc.forEach(g=>{const c=s[g]||0;if(c>0){const seg=el('<div class="vseg"></div>');seg.style.height=(c/tot*100)+"%";seg.style.background=groupColor[g];attachTip(seg,tipRow(g,c,(c/tot*100).toFixed(1),hq));col.appendChild(seg);}});
    wrap.appendChild(col);
    wrap.appendChild(el(`<div class="vcol-x">${hq}</div>`));
    plot.appendChild(wrap);
  });
  chart.appendChild(plot);
  panel.appendChild(chart);
  return panel;
}

// лӢЁл§җкө° Г— мқјмһҗлі„ м¶”мқҙ (кәҫмқҖм„  SVG) вҖ” м „мӮ¬к°ңмҡ” н•ҳлӢЁ. daily_group_series={dates,groups{g:[..]}}
function dailyGroupLineChart(dgs, order){
  const panel=el('<div class="panel"><h2>лӢЁл§җкө° Г— мқјмһҗлі„ м¶”мқҙ</h2><div class="pcap2">м„ нғқ кё°к°„(лӢЁмқјмқјмқҖ мөңк·ј 30мқј)мқҳ мқјлі„ нҢҗл§Ө В· лӢЁл§җкө°лі„ кәҫмқҖм„  В· <b>лІ”лЎҖ нҒҙлҰӯмңјлЎң м„  мјңкё°/лҒ„кё°</b> (yм¶• мһҗлҸҷ мһ¬мЎ°м •)</div></div>');
  const dates=(dgs&&dgs.dates)||[], series=(dgs&&dgs.groups)||{};
  if(!dates.length){ panel.appendChild(el('<div class="loading">лҚ°мқҙн„° м—ҶмқҢ</div>')); return panel; }
  const cand=(order||Object.keys(series)).filter(g=>series[g] && (STATE.simOn||g!=="SIMonly"));   // лІ”лЎҖ нӣ„ліҙ(м „мІҙ)
  const shown=cand.filter(g=>!STATE.lineHidden.has(g));                                            // мӢӨм ң к·ёлҰҙ м„ (лҒҲ кІғ м ңмҷё)
  const W=920,H=226,pad={l:48,r:16,t:14,b:34}, x0=pad.l,x1=W-pad.r,y0=H-pad.b,y1=pad.t;   // лҶ’мқҙ 2/3лЎң м¶•мҶҢ
  let maxV=1; shown.forEach(g=>series[g].forEach(v=>{if(v>maxV)maxV=v;}));
  const n=dates.length;
  const sx=i=> n<=1 ? (x0+x1)/2 : x0+i/(n-1)*(x1-x0);
  const sy=v=> y0-v/maxV*(y0-y1);
  let s='';
  for(let k=0;k<=4;k++){const yv=maxV*k/4, yy=sy(yv);
    s+=`<line x1="${x0}" y1="${yy}" x2="${x1}" y2="${yy}" stroke="var(--border)" stroke-dasharray="3 3"/>`;
    s+=`<text x="${x0-6}" y="${yy+3}" text-anchor="end" font-size="10" fill="var(--muted)">${num(Math.round(yv))}</text>`;}
  const step=Math.max(1,Math.ceil(n/8));
  dates.forEach((d,i)=>{ if(i%step===0||i===n-1) s+=`<text x="${sx(i)}" y="${y0+15}" text-anchor="middle" font-size="10" fill="var(--muted)">${d.slice(4,6)}/${d.slice(6,8)}</text>`; });
  shown.forEach(g=>{ const col=groupColor[g]||"#888";
    const pts=series[g].map((v,i)=>`${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(" ");
    s+=`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>`;
    series[g].forEach((v,i)=>{                                   // л§Ҳм»Ө вҖ” к°Ғ лҚ°мқҙн„° нҸ¬мқёнҠё
      s+=`<circle cx="${sx(i).toFixed(1)}" cy="${sy(v).toFixed(1)}" r="2.4" fill="${col}" stroke="var(--surface)" stroke-width="0.7"/>`; });
  });
  // index лӘЁл“ң вҖ” м„ёлЎң нҒ¬лЎңмҠӨн—Өм–ҙ(мҙҲкё° мҲЁк№Җ) + лӮ м§ңлі„ м„ёлЎң нһҲнҠёл°ҙл“ң(к·ё лӮ м§ңмқҳ лӘЁл“  лқјмқё к°’ н•ңлІҲм—җ)
  s+=`<line class="lc-cross" x1="0" y1="${y1}" x2="0" y2="${y0}" stroke="var(--line2)" stroke-dasharray="3 3" style="opacity:0;pointer-events:none"/>`;
  const bw = n>1 ? (x1-x0)/(n-1) : (x1-x0);
  dates.forEach((d,i)=>{ const cx=sx(i);
    s+=`<rect class="lc-band" data-i="${i}" x="${(cx-bw/2).toFixed(1)}" y="${y1}" width="${bw.toFixed(1)}" height="${(y0-y1).toFixed(1)}" fill="transparent" style="cursor:crosshair"/>`; });
  const svgEl=el(`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${s}</svg>`);
  panel.appendChild(svgEl);
  const cross=svgEl.querySelector(".lc-cross");
  svgEl.querySelectorAll(".lc-band").forEach(b=>{ const i=+b.dataset.i, cx=sx(i).toFixed(1);
    const rowsv=shown.map(g=>({g, v:series[g][i]})).sort((a,b)=>b.v-a.v);   // к°’ нҒ° мҲң
    const html=`<div class="tip-k" style="margin-bottom:3px;font-weight:700">${dates[i].slice(4,6)}/${dates[i].slice(6,8)}</div>`
      + rowsv.map(r=>`<div style="white-space:nowrap"><i class="tip-sw" style="background:${groupColor[r.g]||'#888'}"></i>${glabel(r.g)} <b>${num(r.v)}</b></div>`).join("");
    attachTip(b, html);
    b.addEventListener("mouseenter",()=>{ cross.setAttribute("x1",cx); cross.setAttribute("x2",cx); cross.style.opacity=1; });
    b.addEventListener("mouseleave",()=>{ cross.style.opacity=0; });
  });
  const lg=el('<div class="cmp-legend" style="flex-wrap:wrap;margin-top:8px"></div>');
  cand.forEach(g=>{ const off=STATE.lineHidden.has(g);
    const sp=el(`<span style="cursor:pointer;user-select:none;${off?'opacity:.4;text-decoration:line-through':''}"><i style="background:${groupColor[g]||'#888'}"></i>${glabel(g)}</span>`);
    sp.onclick=()=>{ STATE.lineHidden.has(g)?STATE.lineHidden.delete(g):STATE.lineHidden.add(g); render(); };
    lg.appendChild(sp); });
  panel.appendChild(lg);
  return panel;
}

// лӢЁл§җкө° Г— ліёл¶Җ мҡ”м•Ҫн‘ң (м…Җ=кұҙмҲҳВ·ліёл¶ҖлӮҙл№„мӨ‘, м „мӮ¬н•©/н•©кі„). н…Ңмқҙлё” м „мІҙлҘј 1к°ң л¬ёмһҗм—ҙлЎң мғқм„ұ
function crossTable(stacked,groups,hqs){
  const panel=el('<div class="panel"><h2>лӢЁл§җкө° Г— ліёл¶Җ мҡ”м•Ҫн‘ң</h2><div class="pcap2">м…Җ: нҢҗл§ӨкұҙмҲҳ В· ліёл¶ҖлӮҙл№„мӨ‘% / ліёл¶Җк°„м җмң л№„%</div></div>');
  const map={};stacked.forEach(s=>map[s.hq]=s.groups||{});
  const colTot={};let grand=0;                                   // ліёл¶ҖлӮҙл№„мӨ‘ л¶„лӘЁ(м—ҙ)
  hqs.forEach(hq=>{let t=0;groups.forEach(g=>t+=(map[hq]&&map[hq][g.group])||0);colTot[hq]=t;grand+=t;});
  const rowTot={};                                               // ліёл¶Җк°„м җмң л№„ л¶„лӘЁ(н–ү=лӢЁл§җкө° м „мӮ¬н•©)
  groups.forEach(g=>{rowTot[g.group]=hqs.reduce((s,hq)=>s+((map[hq]&&map[hq][g.group])||0),0);});
  let h='<table class="xtab"><thead><tr><th class="xh-row">лӢЁл§җкө°</th>';
  hqs.forEach(hq=>h+=`<th>${hq}</th>`);
  h+='<th class="xh-tot">м „мӮ¬н•©</th></tr></thead><tbody>';
  groups.forEach(g=>{
    let cells="";
    hqs.forEach(hq=>{const c=(map[hq]&&map[hq][g.group])||0;
      const inHq=colTot[hq]?(c/colTot[hq]*100).toFixed(1):"0.0";       // ліёл¶ҖлӮҙл№„мӨ‘
      const btw=rowTot[g.group]?(c/rowTot[g.group]*100).toFixed(1):"0.0"; // ліёл¶Җк°„м җмң л№„
      cells+=`<td data-hq="${hq}" data-g="${g.group}" data-c="${c}" data-in="${inHq}" data-bt="${btw}"><div class="xcell"><span class="xc">${num(c)}</span><span class="xp">${inHq}% <span class="xp-b">/ ${btw}%</span></span></div></td>`;});
    h+=`<tr><td class="xn"><i class="swatch" style="margin-right:7px;background:${groupColor[g.group]}"></i>${glabel(g.group)}</td>${cells}<td class="xtot">${num(rowTot[g.group])}</td></tr>`;
  });
  h+='</tbody><tfoot><tr><td class="xn">н•©кі„</td>';
  hqs.forEach(hq=>h+=`<td>${num(colTot[hq])}</td>`);
  h+=`<td class="xtot">${num(grand)}</td></tr></tfoot></table>`;
  const sc=el('<div class="xtab-scroll"></div>');sc.appendChild(el(h));panel.appendChild(sc);
  sc.querySelectorAll("td[data-g]").forEach(td=>attachTip(td,
    `<div class="tip-k">${td.dataset.hq}</div><i class="tip-sw" style="background:${groupColor[td.dataset.g]||'#888'}"></i>${glabel(td.dataset.g)} В· <b>${num(+td.dataset.c)}</b> <span class="tip-k">кұҙ</span><br><span class="tip-k">ліёл¶ҖлӮҙ ${td.dataset.in}% В· ліёл¶Җк°„ ${td.dataset.bt}%</span>`));
  return panel;
}

function legend(dg){
  const lg=el('<div class="legend"></div>');
  (dg||[]).filter(g=>STATE.simOn||g!=="SIMonly").forEach(g=>
    lg.appendChild(el(`<span><i class="swatch" style="background:${groupColor[g]}"></i>${glabel(g)}</span>`)));
  return lg;
}

function kpiCard(label,value,unit,delta){
  const card=el(`<div class="kpi"><div class="l"></div><div class="v">${value}<span class="u">${unit}</span></div><div class="kpi-delta"></div></div>`);
  card.querySelector(".l").textContent=label;
  const d=card.querySelector(".kpi-delta");
  if(delta && delta.pct!=null){
    const up=delta.abs>0, flat=delta.abs===0;
    d.className="kpi-delta "+(flat?"flat":up?"up":"down");
    d.textContent=`${flat?"вҖ“":up?"в–І":"в–ј"} ${up?"+":""}${delta.pct}% (${delta.abs>0?"+":""}${num(delta.abs)}кұҙ)`;
  }else if(delta){ d.className="kpi-delta flat"; d.textContent="л№„көҗ лҚ°мқҙн„° м—ҶмқҢ"; }
  else { d.remove(); }
  return card;
}

function dailyTrend(series,win){
  const panel=el('<div class="panel"><h2>мқјлі„ м¶”мқҙ</h2><div class="trend"></div><div class="trend-cap"></div></div>');
  const t=panel.querySelector(".trend");
  const max=Math.max(...series.map(d=>d.sales_cnt),1);
  const step=Math.ceil(series.length/12);   // xм¶• лқјлІЁ кіјл°Җ л°©м§Җ
  series.forEach((d,i)=>{
    const h=Math.max(2,d.sales_cnt/max*100);
    const lbl=(i%step===0||i===series.length-1)?d.date.slice(6,8):"";
    t.appendChild(el(`<div class="trend-col" title="${fmtD(d.date)}: ${num(d.sales_cnt)}кұҙ"><div class="trend-bar" style="height:${h}%"></div><div class="trend-x">${lbl}</div></div>`));
  });
  if(win)panel.querySelector(".trend-cap").textContent=`${fmtD(win.start)} ~ ${fmtD(win.end)} В· ${series.length}мқј`;
  return panel;
}

// в”Җв”Җ мӢңм җ + л№„көҗ м»ЁнҠёлЎӨ (Method 2: мәҳлҰ°лҚ” + л№ лҘём„ нғқ + л№„көҗ) в”Җв”Җ
const QUICK=[["yesterday","м–ҙм ң"],["mtd","лӢ№мӣ”лҲ„м Ғ"],["prev_month","м „мӣ”"]];
const COMPARES=[["none","м—ҶмқҢ"],["prev_day","м „мқј"],["prev_weekday","м „мЈјлҸҷмҡ”мқј"],["prev_month","м „мӣ”лҸҷкё°к°„"],["prev_year","мһ‘л…„лҸҷкё°к°„"],["custom","м§Ғм ‘м„Өм •"]];
const COMPARE_KO={none:"м—ҶмқҢ",prev_day:"м „мқј",prev_weekday:"м „мЈј лҸҷмҡ”мқј",prev_month:"м „мӣ” лҸҷкё°к°„",prev_year:"мһ‘л…„ лҸҷкё°к°„"};
function fmtD(s){return s?`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`:"-";}
function _d(s){return new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));}
function _ymd(d){return ""+d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");}
function _addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function chipRange(chip,anchor){
  const a=_d(anchor);
  if(chip==="mtd")        return [_ymd(new Date(a.getFullYear(),a.getMonth(),1)),anchor];
  if(chip==="prev_month") return [_ymd(new Date(a.getFullYear(),a.getMonth()-1,1)),_ymd(new Date(a.getFullYear(),a.getMonth(),0))];
  if(chip==="last7")      return [_ymd(_addDays(a,-6)),anchor];
  if(chip==="last30")     return [_ymd(_addDays(a,-29)),anchor];
  return [anchor,anchor]; // yesterday(лӢЁмқј)
}
const CHIP_LABEL={realtime:"мӢӨмӢңк°„",yesterday:"м–ҙм ң",mtd:"лӢ№мӣ”лҲ„м Ғ",prev_month:"м „мӣ”",last7:"мөңк·ј 7мқј",last30:"мөңк·ј 30мқј"};

  if(m && m!==STATE.loadedYm) loadBrief();

function applyChip(chip){
  const base=STATE.dataMax||STATE.anchor;   // л№ лҘём№©мқҖ 'лҚ°мқҙн„° мөңмӢ мқј' кё°мӨҖ(м–ҙм ң=мөңмӢ мқј)
  const [s,e]=chipRange(chip,base);
  STATE.chip=chip; STATE.rangeMode=false; STATE.rangeStart=s; STATE.rangeEnd=e; STATE.anchor=e;
  loadPeriod();
}
const MIN_DATE="20250101";   // лӢ¬л Ҙ мөңмҶҢ м„ нғқмқј(н•ҳл“ңмҪ”л”©) вҖ” лҚ°мқҙн„°к°Җ лҚ” м§§м•„лҸ„ м—¬кё°к№Ңм§„ м„ нғқ к°ҖлҠҘ
function _clampYmd(ymd){ // н•ҳн•ң(2025-01-01)~лҚ°мқҙн„° мөңмӢ мқјлЎң нҒҙлһЁн”„
  if(ymd<MIN_DATE) return MIN_DATE;
  if(STATE.dataMax && ymd>STATE.dataMax) return STATE.dataMax;
  return ymd;
}
function applyDate(ymd){ // мәҳлҰ°лҚ” лӢЁмқј м„ нғқ вҶ’ нҠ№м • мқјмһҗ, лҚ°мқҙн„° лІ”мң„лЎң нҒҙлһЁн”„
  ymd=_clampYmd(ymd);
  STATE.chip=null; STATE.rangeMode=false; STATE.anchor=ymd; STATE.rangeStart=ymd; STATE.rangeEnd=ymd;
  loadPeriod();
}
function applyRange(sy,ey){ // мӢңмһ‘~мў…лЈҢ кё°к°„ м§Ғм ‘ м„ нғқ (лӢЁмқјмқјмқҙл©ҙ sy==ey)
  sy=_clampYmd(sy); ey=_clampYmd(ey);
  if(sy>ey){const t=sy;sy=ey;ey=t;}        // мҲңм„ң мһҗлҸҷ ліҙм •
  STATE.chip=null; STATE.rangeMode=true; STATE.rangeStart=sy; STATE.rangeEnd=ey; STATE.anchor=ey;
  loadPeriod();
}

    hq=>arr(hq,"daily"),v=>num(v),"кё°к°„н•©кі„",(hq,a)=>num(a.reduce((s,v)=>s+v,0))));
  m.appendChild(deviceTable("ліёл¶Җлі„ ліёл¶ҖлӮҙл№„мӨ‘ (мқјмһҗлі„)","лҸҷмқј лҚ°мқҙн„° В· кё°к°„ м§‘кі„ = кё°к°„ к°ҖмӨ‘нҸүк· (лӢЁмҲңнҸүк·  м•„лӢҳ)",dates,hqs,hqCol,
    hq=>arr(hq,"daily_share_in_hq"),v=>v.toFixed(1)+"%","кё°к°„нҸүк· ",hq=>(byHqMap[hq]||{}).share_in_hq.toFixed(1)+"%"));
  m.appendChild(deviceTable("ліёл¶Җлі„ ліёл¶Җк°„м җмң л№„ (мқјмһҗлі„)","лҸҷмқј лҚ°мқҙн„° В· кё°к°„ м§‘кі„ = кё°к°„н•©кі„ м җмң л№„",dates,hqs,hqCol,
    hq=>arr(hq,"daily_share_of_group"),v=>v.toFixed(1)+"%","кё°к°„м җмң л№„",hq=>(byHqMap[hq]||{}).share_of_group.toFixed(1)+"%"));

function deviceDonut(item,hqCol){
  const panel=el('<div class="panel"><div class="panel-hd"><h2></h2></div></div>');
  panel.querySelector("h2").textContent=`${glabel(item.group)} нҢҗл§Ө нҸ¬нҠёнҸҙлҰ¬мҳӨ В· ліёл¶Җк°„ м җмң л№„`;
  const body=el('<div class="donut-body"></div>');
  const avail=item.by_hq.filter(h=>h.count>0);            // мқҙлҜё count desc
  const total=item.total||1, R=15.91549; let cum=0;
  const arcs=avail.map((h,i)=>{const sh=h.count/total*100,off=25-cum;cum+=sh;
    return `<circle data-i="${i}" cx="21" cy="21" r="${R}" fill="none" stroke="${hqCol[h.hq]}" stroke-width="5.4" stroke-dasharray="${sh.toFixed(3)} ${(100-sh).toFixed(3)}" stroke-dashoffset="${off.toFixed(3)}"></circle>`;}).join("");
  const svg=el(`<svg class="donut" viewBox="0 0 42 42"><circle cx="21" cy="21" r="${R}" fill="none" stroke="var(--surface2)" stroke-width="5.4"></circle>${arcs}<text x="21" y="20" class="donut-total">${num(item.total)}</text><text x="21" y="24.6" class="donut-lbl">кұҙ</text></svg>`);
  svg.querySelectorAll("circle[data-i]").forEach(c=>{const h=avail[+c.dataset.i];attachTip(c,`<i class="tip-sw" style="background:${hqCol[h.hq]}"></i>${h.hq} В· <b>${num(h.count)}</b>кұҙ (${h.share_of_group}%)`);});
  body.appendChild(svg);
  const lg=el('<div class="donut-legend"></div>');
  avail.forEach(h=>{const row=el(`<div class="dlg-row"><i class="swatch"></i><span class="dlg-name"></span><span class="dlg-cnt"></span><span class="dlg-val"></span></div>`);
    row.querySelector(".swatch").style.background=hqCol[h.hq];
    row.querySelector(".dlg-name").textContent=h.hq;
    row.querySelector(".dlg-cnt").textContent=`${num(h.count)}кұҙ`;
    row.querySelector(".dlg-val").textContent=`${h.share_of_group}%`;
    lg.appendChild(row);});
  body.appendChild(lg);
  panel.appendChild(body);
  return panel;
}

function deviceBarPanel(item,dates){
  const panel=el(`<div class="panel"><h2>${glabel(item.group)} мқјмһҗлі„ нҢҗл§Өлҹү л¶„нҸ¬</h2><div class="pcap2">м „мІҙ ліёл¶Җ н•©кі„ кё°мӨҖ мқјлі„ л¶„нҸ¬ В· <b>л§үлҢҖлҘј нҒҙлҰӯн•ҳл©ҙ мЎ°нҡҢ мқјмһҗк°Җ л°”лҖқлӢҲлӢӨ</b> В· кё°к°„мқҙ кёёл©ҙ мўҢмҡ° мҠӨнҒ¬лЎӨ</div></div>`);
  const vals=item.daily_total||[];
  if(!dates.length){panel.appendChild(el('<div class="loading">лҚ°мқҙн„° м—ҶмқҢ</div>'));return panel;}
  // нҢЁл„җ нҒ¬кё°лҠ” кі м •(2л¶„н• ). лӮҙл¶Җ л§үлҢҖл§Ң н•ҳлЈЁ мөңмҶҢ мҠ¬лЎҜ(PER)px нҷ•ліҙ вҶ’ м§§мңјл©ҙ нҢЁл„җ кҪү мұ„мҡ°кі (min-width:100%),
  // кёёл©ҙ нҢЁл„җ м•Ҳм—җм„ң мўҢмҡ° мҠӨнҒ¬лЎӨ(л§үлҢҖ көөкё° мң м§Җ). floorвүҲл°ҳнҸӯ нҢЁл„җ лӮҙл¶ҖнҸӯ.
  const n=dates.length, PER=30, H=260, pad={l:50,r:14,t:14,b:30};
  const W=Math.max(560, pad.l+pad.r+n*PER), x0=pad.l,x1=W-pad.r,y0=H-pad.b,y1=pad.t;
  let maxV=1;vals.forEach(v=>{if(v>maxV)maxV=v;});
  const bw=(x1-x0)/n, sy=v=>y0-v/maxV*(y0-y1);
  let s='';
  for(let k=0;k<=4;k++){const yv=maxV*k/4,yy=sy(yv);
    s+=`<line x1="${x0}" y1="${yy}" x2="${x1}" y2="${yy}" stroke="var(--border)" stroke-dasharray="3 3"/>`;
    s+=`<text x="${x0-8}" y="${yy+3}" text-anchor="end" font-size="11" fill="var(--muted)">${num(Math.round(yv))}</text>`;}
  const step=Math.max(1,Math.round(n/Math.max(6,(W-x0-pad.r)/70)));   // лқјлІЁ кіјл°Җ л°©м§Җ(~70px к°„кІ©)
  dates.forEach((d,i)=>{const x=x0+i*bw, w=Math.max(3,bw*0.66), top=sy(vals[i]||0), sel=d===STATE.deviceViewDate;
    s+=`<rect class="dbar" data-d="${d}" x="${(x+(bw-w)/2).toFixed(1)}" y="${top.toFixed(1)}" width="${w.toFixed(1)}" height="${Math.max(0,y0-top).toFixed(1)}" rx="2" fill="${sel?'var(--accent)':'color-mix(in srgb,var(--accent) 26%,transparent)'}" style="cursor:pointer"/>`;
    if(i%step===0||i===n-1) s+=`<text x="${(x+bw/2).toFixed(1)}" y="${y0+15}" text-anchor="middle" font-size="10" fill="var(--muted)">${d.slice(4,6)}/${d.slice(6,8)}</text>`;});
  const svg=el(`<svg viewBox="0 0 ${W} ${H}" style="width:${W}px;min-width:100%;max-width:none;height:auto">${s}</svg>`);
  svg.querySelectorAll(".dbar").forEach(r=>{const d=r.dataset.d,i=dates.indexOf(d);
    attachTip(r,`<div class="tip-k">${d.slice(4,6)}/${d.slice(6,8)}</div><b>${num(vals[i]||0)}</b> кұҙ`);
    r.onclick=()=>{STATE.deviceViewDate=d;render();};});
  const scroll=el('<div style="overflow-x:auto;min-width:0"></div>'); scroll.appendChild(svg);
  panel.style.minWidth="0";                                // grid 1fr нҠёлһҷ blowout л°©м§Җ(л§үлҢҖ SVGк°Җ м—ҙмқ„ л°Җм§Җ м•ҠкІҢ)
  panel.appendChild(scroll);
  return panel;
}

// ліёл¶Җлі„ лқјмқём°ЁнҠё(м ңл„ӨлҰӯ) вҖ” dailyGroupLineChartмқҳ ліёл¶Җ лІ„м „. isPctл©ҙ yм¶•В·к°’ % нҸ¬л§·.
function hqLineChart(title,cap,dates,hqs,hqCol,arrFn,isPct){
  const panel=el(`<div class="panel"><h2>${title}</h2><div class="pcap2">${cap} В· <b>лІ”лЎҖлҘј нҒҙлҰӯн•ҳл©ҙ нҠ№м • ліёл¶Җл§Ң ліҙкұ°лӮҳ мҲЁкёё мҲҳ мһҲм–ҙмҡ”</b></div></div>`);
  if(!dates.length){panel.appendChild(el('<div class="loading">лҚ°мқҙн„° м—ҶмқҢ</div>'));return panel;}
  const series={}; hqs.forEach(h=>series[h]=arrFn(h)||[]);
  const shown=hqs.filter(h=>!STATE.deviceHqHidden.has(h));
  const W=920,H=226,pad={l:48,r:16,t:14,b:34},x0=pad.l,x1=W-pad.r,y0=H-pad.b,y1=pad.t;
  let maxV=1; shown.forEach(h=>series[h].forEach(v=>{if(v>maxV)maxV=v;}));
  const n=dates.length, sx=i=>n<=1?(x0+x1)/2:x0+i/(n-1)*(x1-x0), sy=v=>y0-v/maxV*(y0-y1);
  const fmtV=v=>isPct?(Math.round(v*10)/10+"%"):num(Math.round(v));
  let s='';
  for(let k=0;k<=4;k++){const yv=maxV*k/4,yy=sy(yv);
    s+=`<line x1="${x0}" y1="${yy}" x2="${x1}" y2="${yy}" stroke="var(--border)" stroke-dasharray="3 3"/>`;
    s+=`<text x="${x0-6}" y="${yy+3}" text-anchor="end" font-size="10" fill="var(--muted)">${fmtV(yv)}</text>`;}
  const step=Math.max(1,Math.ceil(n/8));
  dates.forEach((d,i)=>{if(i%step===0||i===n-1)s+=`<text x="${sx(i)}" y="${y0+15}" text-anchor="middle" font-size="10" fill="var(--muted)">${d.slice(4,6)}/${d.slice(6,8)}</text>`;});
  shown.forEach(h=>{const col=hqCol[h]||"#888", a=series[h];
    const pts=a.map((v,i)=>`${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(" ");
    s+=`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>`;
    a.forEach((v,i)=>{s+=`<circle cx="${sx(i).toFixed(1)}" cy="${sy(v).toFixed(1)}" r="2.2" fill="${col}" stroke="var(--surface)" stroke-width="0.7"/>`;});
  });
  s+=`<line class="lc-cross" x1="0" y1="${y1}" x2="0" y2="${y0}" stroke="var(--line2)" stroke-dasharray="3 3" style="opacity:0;pointer-events:none"/>`;
  const bw=n>1?(x1-x0)/(n-1):(x1-x0);
  dates.forEach((d,i)=>{const cx=sx(i);s+=`<rect class="lc-band" data-i="${i}" x="${(cx-bw/2).toFixed(1)}" y="${y1}" width="${bw.toFixed(1)}" height="${(y0-y1).toFixed(1)}" fill="transparent" style="cursor:crosshair"/>`;});
  const svgEl=el(`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${s}</svg>`);
  panel.appendChild(svgEl);
  const cross=svgEl.querySelector(".lc-cross");
  svgEl.querySelectorAll(".lc-band").forEach(bnd=>{const i=+bnd.dataset.i,cx=sx(i).toFixed(1);
    const rowsv=shown.map(h=>({h,v:series[h][i]})).sort((a,b)=>b.v-a.v);
    const html=`<div class="tip-k" style="margin-bottom:3px;font-weight:700">${dates[i].slice(4,6)}/${dates[i].slice(6,8)}</div>`+rowsv.map(r=>`<div style="white-space:nowrap"><i class="tip-sw" style="background:${hqCol[r.h]||'#888'}"></i>${r.h} <b>${fmtV(r.v)}</b></div>`).join("");
    attachTip(bnd,html);
    bnd.addEventListener("mouseenter",()=>{cross.setAttribute("x1",cx);cross.setAttribute("x2",cx);cross.style.opacity=1;});
    bnd.addEventListener("mouseleave",()=>{cross.style.opacity=0;});
  });
  const lg=el('<div class="cmp-legend" style="flex-wrap:wrap;margin-top:8px"></div>');
  hqs.forEach((h,i)=>{const off=STATE.deviceHqHidden.has(h);
    const sp=el(`<span style="cursor:pointer;user-select:none;${off?'opacity:.4;text-decoration:line-through':''}"><i style="background:${hqCol[h]||'#888'}"></i>${h}</span>`);
    sp.onclick=()=>{STATE.deviceHqHidden.has(h)?STATE.deviceHqHidden.delete(h):STATE.deviceHqHidden.add(h);render();};
    lg.appendChild(sp);});
  panel.appendChild(lg);
  return panel;
}
