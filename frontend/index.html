<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MNO 단말 판매 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  /* ── 테마 토큰: 라이트 기본 + [data-theme="dark"] 오버라이드 ── */
  /* MNO SYNAPSE 디자인 토큰 — 라이트(near-white 중립) */
  :root, [data-theme="light"]{
    color-scheme:light;
    --bg:#FAFBFD;--surface:#FFFFFF;--surface2:#F1F3F7;--border:#E2E6EF;--line2:#CDD3E0;
    --text:#16182B;--t1:#3C4060;--muted:#6E7499;--dim:#9AA0C0;
    --accent:#3617CE;--brand2:#5B3FE8;--accent-soft:#E7E2FB;--accent-rgb:54,23,206;
    --red:#D64B3F;--red-soft:#FBE7E3;
    --orange:#B5821B;--orange-soft:#F8EFD8;--green:#2E9E6B;--green-soft:#E2F3EA;
    --blue:#5B3FE8;
    --shadow:0 1px 2px rgba(20,21,40,.05),0 10px 30px rgba(20,21,40,.07);
  }
  /* MNO SYNAPSE 디자인 토큰 — 다크 */
  [data-theme="dark"]{
    color-scheme:dark;
    --bg:#0A0B16;--surface:#11132A;--surface2:#161A38;--border:#222845;--line2:#313863;
    --text:#EEEFFA;--t1:#C2C6E0;--muted:#8C92B8;--dim:#5E6388;
    --accent:#7E68FF;--brand2:#9E8CFF;--accent-soft:#231C58;--accent-rgb:126,104,255;
    --red:#F4766A;--red-soft:#2E1714;
    --orange:#E0A63A;--orange-soft:#2A2110;--green:#4FBE8C;--green-soft:#0E2A1E;
    --blue:#9E8CFF;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 14px 36px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Pretendard Variable',Pretendard,'Apple SD Gothic Neo',-apple-system,sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;transition:background .2s ease,color .2s ease}
  /* 수치·메타는 JetBrains Mono (tabular-nums) */
  .kpi .v,.kpi-delta,.bar-row .val,.pcap,.dg-meta,.dg-err,.pbar-date,.heat td,
  td:not(:first-child){font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,monospace;font-variant-numeric:tabular-nums}

  /* 헤더 아이콘 버튼 (테마 토글 · 도움말) */
  .icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  .nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .nav-mark{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--brand2));position:relative;margin-right:9px;flex-shrink:0}
  .nav-mark::after{content:'';position:absolute;inset:6px;border-radius:50%;background:var(--surface)}
  .nav-logo{font-size:14px;font-weight:800;color:var(--text);letter-spacing:-.2px}
  .nav-sep{color:var(--border);margin:0 10px}
  .nav-title{font-size:13px;color:var(--muted)}
  .nav-right{display:flex;align-items:center;gap:14px}
  .chip{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  .dot.ok{background:var(--green)}.dot.mock{background:var(--orange)}.dot.err{background:var(--red)}

  .tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;position:sticky;top:50px;z-index:99;overflow-x:auto}
  .tab{padding:11px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

  .ctrl{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:91px;z-index:98}
  .ctrl label{font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .ctrl input{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-weight:600;padding:5px 9px;width:90px}
  .btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .toggle{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}

  main{max-width:1200px;margin:0 auto;padding:22px 20px 60px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:18px}
  .panel h2{font-size:14px;margin:0 0 14px;font-weight:700}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px 16px}
  .kpi .l{font-size:12px;color:var(--muted);margin-bottom:7px}
  .kpi .v{font-size:24px;font-weight:800}
  .kpi .u{font-size:12px;color:var(--dim);font-weight:400;margin-left:3px}

  .bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12px}
  .bar-row .name{width:120px;color:var(--muted);flex-shrink:0;text-align:right}
  .bar-track{flex:1;background:var(--surface2);border-radius:5px;height:18px;overflow:hidden}
  .bar-fill{height:100%;border-radius:5px}
  .bar-row .val{width:90px;text-align:right;font-variant-numeric:tabular-nums}

  .stack{display:flex;flex:1;min-width:0;height:20px;border-radius:5px;overflow:hidden;background:var(--surface2)}
  .stack-seg{height:100%;flex-shrink:0}
  .stack-row{display:flex;align-items:center;gap:10px;margin:6px 0}
  .stack-row .name{width:96px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-size:11px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:5px}
  .swatch{width:10px;height:10px;border-radius:2px;display:inline-block}

  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:7px 9px;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--muted);font-weight:600;position:sticky;top:0;background:var(--surface)}
  .table-wrap{overflow-x:auto}

  .hq-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .hq-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600}
  .hq-chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

  .oi-pos{color:var(--green);font-weight:700}
  .oi-neg{color:var(--red);font-weight:700}

  .alert{display:flex;gap:12px;align-items:center;padding:11px 14px;border-radius:9px;margin-bottom:8px;border:1px solid var(--border)}
  .alert .lv{font-size:11px;font-weight:800;padding:2px 9px;border-radius:5px;flex-shrink:0}
  .alert.urgent{background:var(--red-soft);border-color:var(--red)}.alert.urgent .lv{background:var(--red);color:#fff}
  .alert.warn{background:var(--orange-soft);border-color:var(--orange)}.alert.warn .lv{background:var(--orange);color:#fff}
  .alert.info{background:var(--surface2);border-color:var(--border)}.alert.info .lv{background:var(--line2);color:var(--text)}
  .alert .msg{flex:1;font-size:13px}

  .heat td{text-align:center;font-variant-numeric:tabular-nums;border:1px solid var(--border)}
  .heat th{text-align:center}
  .heat td.hqname{text-align:left;color:var(--muted);font-weight:600;white-space:nowrap}

  .loading,.error{padding:50px;text-align:center;color:var(--muted)}
  .error{color:var(--red)}
  .scaffold-note{font-size:11px;color:var(--dim);margin-top:6px}

  /* 시점+비교 컨트롤(Method 2) + KPI 델타 */
  /* 필터바: 카드 X — 헤더와 이어지는 흰색 풀폭 띠 */
  .filterbar{background:var(--surface);border-bottom:1px solid var(--border)}
  .pbar{padding:11px 24px;display:flex;flex-wrap:wrap;align-items:center;gap:8px 18px}
  .pbar-divider{width:1px;align-self:stretch;background:var(--border);margin:2px 0}
  .pbar-grp{display:flex;align-items:center;gap:8px}
  .pbar-ic{font-size:15px}
  .pbar-lbl{font-size:10.5px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
  .pbar-date{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:600;padding:6px 10px}
  .pbar-sel{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:600;padding:6px 10px;cursor:pointer}
  .qchips{display:inline-flex;gap:4px;flex-wrap:wrap}
  .qchip{font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:6px 13px;cursor:pointer;transition:all .15s}
  .qchip:hover{border-color:var(--accent);color:var(--accent)}
  .qchip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:700}
  .qchip.rt{border-color:var(--line2);color:var(--accent)}
  .qchip.rt.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .pcap{font-size:12px;color:var(--muted);margin:2px 0 16px 2px}
  .kpi-delta{font-size:11.5px;font-weight:700;margin-top:6px}
  .kpi-delta.up{color:var(--green)} .kpi-delta.down{color:var(--red)}
  .kpi-delta.flat{color:var(--dim);font-weight:600}
  /* 일별 추이 (막대) */
  .trend{display:flex;align-items:flex-end;gap:2px;height:120px;overflow-x:auto;padding-top:6px}
  .trend-col{flex:1;min-width:9px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;cursor:default}
  .trend-bar{width:72%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;transition:height .2s}
  .trend-col:hover .trend-bar{background:var(--brand2)}
  .trend-x{font-size:9px;color:var(--dim);margin-top:5px;font-family:'JetBrains Mono',monospace}
  .trend-cap{font-size:11px;color:var(--dim);margin-top:8px;font-family:'JetBrains Mono',monospace}

  /* 탭 배지(알림 건수) */
  .tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 5px;margin-left:6px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;vertical-align:middle;line-height:1}
  /* KPI — Top3 랭크(단말군 색) + 서브라인 */
  .kpi-rank{display:flex;align-items:center;gap:6px}
  .kpi-rank .rk{font-family:'JetBrains Mono',monospace;font-weight:800}
  .kpi-rank .rn{font-weight:700}
  .kpi-sub{font-size:11.5px;color:var(--muted);margin-top:5px}
  /* 패널 헤더(제목 + 우측 토글) */
  .panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .panel-hd h2{margin:0}
  .sim-toggle{font-size:11px}
  /* 도넛(단말군별 비중) */
  .donut-body{display:flex;align-items:center;gap:20px}
  .donut{width:172px;height:172px;flex-shrink:0}
  .donut-total{text-anchor:middle;font:800 6.2px 'JetBrains Mono',monospace;fill:var(--text)}
  .donut-lbl{text-anchor:middle;font:400 2.7px 'Pretendard Variable',sans-serif;fill:var(--dim)}
  .donut-legend{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
  .dlg-row{display:flex;align-items:center;gap:8px;font-size:12px}
  .dlg-name{color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dlg-val{font-family:'JetBrains Mono',monospace;color:var(--muted);font-variant-numeric:tabular-nums}
  /* 본부별 100% 세로 누적 */
  .vchart{display:flex;gap:8px;height:236px;margin-top:4px}
  .vaxis{display:flex;flex-direction:column;justify-content:space-between;font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;padding-bottom:22px;text-align:right;width:32px;flex-shrink:0}
  .vplot{flex:1;display:flex;align-items:flex-end;gap:9px;min-width:0}
  .vcol-wrap{flex:1;display:flex;flex-direction:column;height:100%;min-width:0}
  .vcol{flex:1;display:flex;flex-direction:column-reverse;border-radius:4px 4px 0 0;overflow:hidden;background:var(--surface2)}
  .vseg{width:100%;flex-shrink:0}
  .vcol-x{height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-top:4px}
  /* 단말군 × 본부 요약표 */
  .xtab-scroll{overflow-x:auto}
  .xtab{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
  .xtab th,.xtab td{padding:8px 11px;text-align:right;border-bottom:1px solid var(--border)}
  .xtab thead th{color:var(--dim);font-weight:700;font-size:11px}
  .xtab th.xh-row,.xtab td.xn{text-align:left;color:var(--t1);font-weight:600}
  .xtab .xp{color:var(--dim);font-weight:400;font-size:11px}
  .xtab .xtot,.xtab th.xh-tot{font-weight:800;color:var(--text)}
  .xtab tfoot td{border-bottom:none;border-top:2px solid var(--line2);font-weight:800;color:var(--text)}

  /* ── 데이터 연결 진단: 알약 chip + slide-in drawer (미니멀) ── */
  .chip.clickable{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
    padding:4px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface);
    cursor:pointer;transition:box-shadow .18s,border-color .18s,background .18s}
  .chip.clickable .dot{display:none}
  .chip.clickable:hover{box-shadow:0 0 0 3px var(--accent-soft)}
  .chip.dg-ok{background:var(--green-soft);border-color:var(--green);color:var(--green)}
  .chip.dg-loading{background:var(--orange-soft);border-color:var(--orange);color:var(--orange)}
  .chip.dg-fail{background:var(--red-soft);border-color:var(--red);color:var(--red)}

  .diag-backdrop{position:fixed;inset:0;background:rgba(17,24,39,.30);z-index:300;
    opacity:0;pointer-events:none;transition:opacity .26s ease}
  .diag-backdrop.open{opacity:1;pointer-events:auto}
  .diag-drawer{position:fixed;top:0;right:0;width:400px;max-width:94vw;height:100vh;background:var(--surface);
    border-left:1px solid var(--border);box-shadow:-18px 0 44px rgba(17,24,39,.13);z-index:301;
    display:flex;flex-direction:column;font-family:system-ui,-apple-system,'Apple SD Gothic Neo',sans-serif;
    transform:translateX(100%);transition:transform .27s cubic-bezier(.4,0,.2,1)}
  .diag-drawer.open{transform:translateX(0)}
  .dg-head{display:flex;align-items:flex-start;gap:12px;padding:20px 22px 15px;border-bottom:1px solid var(--border)}
  .dg-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .dg-sub{font-size:11.5px;color:var(--muted);margin-top:3px;word-break:break-all}
  .dg-x{margin-left:auto;border:none;background:none;color:var(--dim);font-size:15px;cursor:pointer;padding:2px 5px;border-radius:6px;line-height:1}
  .dg-x:hover{background:var(--surface2);color:var(--text)}
  .dg-list{flex:1;overflow-y:auto;padding:4px 22px}
  .dg-stage{border-top:1px solid var(--border)}
  .dg-stage:first-child{border-top:none}
  .dg-row{display:flex;align-items:center;gap:13px;padding:15px 2px;cursor:pointer}
  .dg-ic{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:800;flex-shrink:0}
  .dg-ic.ok{background:var(--green-soft);color:var(--green)}
  .dg-ic.failed{background:var(--red-soft);color:var(--red)}
  .dg-ic.skipped,.dg-ic.pending{background:var(--surface2);color:var(--dim)}
  .dg-spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--orange);
    border-radius:50%;animation:dgspin .7s linear infinite;flex-shrink:0;margin:4px}
  @keyframes dgspin{to{transform:rotate(360deg)}}
  .dg-main{flex:1;min-width:0}
  .dg-label{font-size:13.5px;font-weight:600;color:var(--text)}
  .dg-st{font-size:11.5px;margin-top:1px}
  .dg-st.ok{color:var(--green)} .dg-st.failed{color:var(--red)}
  .dg-st.in_progress,.dg-st.pending{color:var(--orange)} .dg-st.skipped{color:var(--dim)}
  .dg-chev{color:var(--dim);font-size:10px;transition:transform .2s;flex-shrink:0}
  .dg-stage.open .dg-chev{transform:rotate(90deg)}
  .dg-detail{max-height:0;overflow:hidden;transition:max-height .25s ease}
  .dg-stage.open .dg-detail{max-height:420px}
  .dg-detail-in{padding:0 0 15px 37px;font-size:12px;color:var(--muted);line-height:1.55}
  .dg-err{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;line-height:1.55;
    background:var(--surface2);color:var(--text);border-radius:7px;padding:10px 11px;
    white-space:pre-wrap;word-break:break-word}
  .dg-foot{border-top:1px solid var(--border);padding:14px 22px 18px}
  .dg-meta{font-size:11px;color:var(--dim);line-height:1.7;margin-bottom:11px;word-break:break-all}
  .dg-reload{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted);
    background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;
    transition:all .15s}
  .dg-reload:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .dg-reload .dg-reload-ic{display:inline-block}
  .dg-reload.spinning .dg-reload-ic{animation:dgspin .7s linear infinite}
  .hidden{display:none}
</style>
</head>
<body data-theme="light">
  <div class="nav">
    <div style="display:flex;align-items:center">
      <span class="nav-mark"></span><span class="nav-logo">MNO DEVICE SALES</span>
      <span class="nav-sep">|</span>
      <span class="nav-title">단말 판매 대시보드 · 본사 관점</span>
    </div>
    <div class="nav-right">
      <span class="chip" id="srcChip"><span class="dot" id="srcDot"></span><span id="srcText">연결 중…</span></span>
      <button class="icon-btn" id="themeBtn" title="라이트/다크 전환" aria-label="테마 전환">🌙</button>
      <button class="icon-btn" id="helpBtn" title="도움말" aria-label="도움말">?</button>
    </div>
  </div>

  <div class="diag-backdrop" id="diagBackdrop"></div>
  <aside class="diag-drawer" id="diagDrawer" role="dialog" aria-label="데이터 연결 상태">
    <div class="dg-head">
      <div>
        <div class="dg-title">데이터 연결 상태</div>
        <div class="dg-sub" id="diagSub">확인 중…</div>
      </div>
      <button class="dg-x" id="diagClose" aria-label="닫기">✕</button>
    </div>
    <div class="dg-list" id="diagStages"></div>
    <div class="dg-foot">
      <div class="dg-meta" id="diagMeta"></div>
      <button class="dg-reload" id="diagReload"><span class="dg-reload-ic">↻</span> 새로고침</button>
    </div>
  </aside>

  <div id="ctrlbar" class="filterbar"></div>

  <div class="tabs" id="tabs"></div>

  <main id="main"><div class="loading">불러오는 중…</div></main>

<script>
const TABS=[
  {id:"overview",label:"전사 개요"},
  {id:"s26",label:"S26군 SKU"},
  {id:"ip17",label:"IP17군 SKU"},
  {id:"byhq",label:"본부별 분석"},
  {id:"alerts",label:"알림"},
  {id:"matrix",label:"본부 매트릭스"},
];
// 무지개 금지 — 브랜드 한 색의 명도 ramp(테마 자동 대응). 카테고리는 색이 아니라 명도로 구분.
// 단말군 카테고리 팔레트 — 쿨톤 8색(보라 앵커, 상태색 회피). 라이트/다크 각각.
const PAL_LIGHT=["#6A4FD0","#3617CE","#2F86C9","#1FA2A2","#8A6BD9","#3D6FB0","#2C8C8C","#9AA0C0"];
const PAL_DARK =["#9E86FF","#7E68FF","#5BA6F0","#3FC7C0","#B39BFF","#6C9BE0","#4FBFBF","#A6ADC9"];
function palette(){return document.body.dataset.theme==="dark"?PAL_DARK:PAL_LIGHT;}
let _groupOrder=[];
function assignColors(groups){        // 단말군→색 고정 매핑(현재 테마 팔레트)
  if(groups)_groupOrder=groups;
  const p=palette();
  (_groupOrder||[]).forEach((g,i)=>groupColor[g]=p[i%p.length]);
}
// chip=빠른선택 id, compareTo=비교 옵션, anchor=기준일(=range end). ov=overview 응답
let STATE={tab:"overview",brief:null,simOn:true,activeHq:null,scrbType:"MNP",
  chip:"yesterday",compareTo:"prev_day",anchor:null,rangeStart:null,rangeEnd:null,ov:null,loadedYm:null,
  dataMin:null,dataMax:null};   // scrbType=가입유형 필터(기본 MNP). dataMin/Max=데이터 범위(달력 제한)

const nf=new Intl.NumberFormat("ko-KR");
const num=n=>nf.format(n??0);
const groupColor={};

function el(html){const t=document.createElement("template");t.innerHTML=html.trim();return t.content.firstChild;}

// ── 데이터 로드 ──────────────────────────────────────────────
async function loadStatus(){
  try{
    const s=await fetch("/api/status").then(r=>r.json());
    STATE.dataMin=s.earliest_exec_dt||null;          // 데이터 실제 범위(달력 제한)
    STATE.dataMax=s.latest_exec_dt||null;
    STATE.anchor=s.latest_exec_dt||STATE.anchor;     // 기준일 기본 = 데이터 최신일
  }catch(e){/* status는 보조 — chip은 diagnostics가 담당 */}
  if(!STATE.anchor){                                // fallback: 브라우저 어제
    const y=new Date(); y.setDate(y.getDate()-1); STATE.anchor=_ymd(y);
  }
}

// 전사 개요 시점+비교 overview 로드 (/api/overview)
async function loadOverview(){
  if(STATE.tab==="overview") render();             // 컨트롤 즉시 반영(+로딩)
  try{
    const qs=new URLSearchParams();
    if(STATE.rangeStart)qs.set("period_start",STATE.rangeStart);
    if(STATE.rangeEnd)qs.set("period_end",STATE.rangeEnd);
    qs.set("compare_to",STATE.compareTo||"none");
    if(STATE.scrbType&&STATE.scrbType!=="전체")qs.set("scrb_type",STATE.scrbType);
    const ov=await fetch("/api/overview?"+qs.toString()).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
    STATE.ov=ov;
    assignColors(ov.meta.device_groups);
  }catch(e){ STATE.ov=null; console.error("overview load 실패",e); }
  if(STATE.tab==="overview") render();
}

// ── 데이터 연결 진단 (4단계 체크리스트 + status chip + 드로어) ──
let _diagPoll=null;
const DIAG_LABEL={ok:"정상",loading:"로드중",failed:"실패"};
const DIAG_ICON={ok:"✓",loading:"⏳",failed:"✗"};
async function loadDiagnostics(){
  try{
    const d=await fetch("/api/diagnostics").then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
    STATE.diag=d; updateChip(d); renderDiagStages(d);
    if(_diagPoll){clearTimeout(_diagPoll);_diagPoll=null;}
    if(d.overall==="loading") _diagPoll=setTimeout(loadDiagnostics,3000); // 적재 중이면 자동 재확인
  }catch(e){
    const chip=document.getElementById("srcChip");
    chip.classList.remove("dg-ok","dg-loading"); chip.classList.add("dg-fail");
    document.getElementById("srcText").textContent="✗ 상태 오류";
  }
}
const DG_GLYPH={ok:"✓",failed:"✕",skipped:"–",pending:"○"};
const DG_STTEXT={ok:"정상",failed:"실패",in_progress:"확인 중…",pending:"대기",skipped:"해당 없음"};
function updateChip(d){
  const chip=document.getElementById("srcChip");
  chip.classList.remove("dg-ok","dg-loading","dg-fail");
  chip.classList.add(d.overall==="ok"?"dg-ok":d.overall==="failed"?"dg-fail":"dg-loading");
  document.getElementById("srcText").textContent=`${DIAG_ICON[d.overall]||"·"} ${d.mock?"MOCK":"Gateway"} · ${DIAG_LABEL[d.overall]||d.overall}`;
}
function _stageIcon(status){
  return status==="in_progress" ? '<div class="dg-spin"></div>'
    : `<div class="dg-ic ${status}">${DG_GLYPH[status]||"·"}</div>`;
}
function renderDiagStages(d){
  document.getElementById("diagSub").textContent=`${d.mock?"MOCK 데이터":"Gateway"} · ${d.source_table||""}`;
  const wrap=document.getElementById("diagStages"); wrap.innerHTML="";
  let mem=null;
  (d.stages||[]).forEach(s=>{
    if(s.key==="memory_cache") mem=s;
    const failed=s.status==="failed";
    const st=el(`<div class="dg-stage${failed?" open":""}"><div class="dg-row">${_stageIcon(s.status)}<div class="dg-main"><div class="dg-label"></div><div class="dg-st ${s.status}"></div></div><span class="dg-chev">▶</span></div><div class="dg-detail"><div class="dg-detail-in"></div></div></div>`);
    st.querySelector(".dg-label").textContent=s.label;
    st.querySelector(".dg-st").textContent=DG_STTEXT[s.status]||s.status;
    const din=st.querySelector(".dg-detail-in");
    if(failed){
      const err=el('<div class="dg-err"></div>'); err.textContent=s.detail||"실패"; din.appendChild(err);
      if(s.missing&&s.missing.length){const m=el('<div style="margin-top:8px"></div>');m.textContent="누락 컬럼: "+s.missing.join(", ");din.appendChild(m);}
    }else{
      const p=el('<div></div>'); p.textContent=s.detail||""; din.appendChild(p);
      if(s.source_table&&s.key==="env_config"){const t=el('<div style="margin-top:5px;color:var(--dim)"></div>');t.textContent="테이블: "+s.source_table;din.appendChild(t);}
    }
    st.querySelector(".dg-row").onclick=()=>st.classList.toggle("open");
    wrap.appendChild(st);
  });
  const meta=document.getElementById("diagMeta");
  meta.textContent=(mem&&mem.rows!=null)
    ? `행 ${num(mem.rows)} · 기간 ${mem.min_exec_dt||"-"}~${mem.max_exec_dt||"-"} (${mem.months||0}개월) · 적재 ${mem.loaded_at||"-"}`
    : "";
}
function openDiag(){loadDiagnostics();document.getElementById("diagDrawer").classList.add("open");document.getElementById("diagBackdrop").classList.add("open");}
function closeDiag(){document.getElementById("diagDrawer").classList.remove("open");document.getElementById("diagBackdrop").classList.remove("open");}

async function loadBrief(){
  // 월간 탭(SKU/본부/매트릭스/알림)용 — 달력 날짜의 '월' 기준
  const ym=(STATE.anchor||"").slice(0,6);
  const monthTab=(STATE.tab!=="overview");
  if(monthTab) document.getElementById("main").innerHTML='<div class="loading">불러오는 중…</div>';
  try{
    const url="/api/brief"+(ym?`?exec_ym=${ym}`:"");
    const b=await fetch(url).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
    STATE.brief=b; STATE.loadedYm=ym;
    assignColors(b.meta.device_groups);
    if(monthTab) render();   // overview 탭이면 loadOverview가 렌더 담당
  }catch(e){
    if(monthTab) document.getElementById("main").innerHTML=`<div class="error">조회 실패: ${e.message}</div>`;
  }
}

// ── 탭 ──────────────────────────────────────────────────────
function renderTabs(){
  const t=document.getElementById("tabs");t.innerHTML="";
  TABS.forEach(tab=>{
    const d=el(`<div class="tab ${tab.id===STATE.tab?"active":""}"></div>`);
    d.appendChild(document.createTextNode(tab.label));
    if(tab.id==="alerts"&&STATE.brief){
      const n=(STATE.brief.alerts||[]).filter(a=>a.level==="urgent"||a.level==="warn").length;
      if(n>0)d.appendChild(el(`<span class="tab-badge">${n}</span>`));
    }
    d.onclick=()=>{STATE.tab=tab.id;render();};
    t.appendChild(d);
  });
}

function render(){
  renderTabs();
  renderCtrlBar();                                          // 전역 날짜 컨트롤바(탭 위)
  const m=document.getElementById("main");m.innerHTML="";
  if(STATE.tab==="overview"){tabOverview(m);return;}       // overview는 STATE.ov 사용
  if(!STATE.brief){m.innerHTML='<div class="loading">불러오는 중…</div>';return;}
  ({s26:()=>tabSku("S26"),ip17:()=>tabSku("IP17"),
    byhq:tabByHq,alerts:tabAlerts,matrix:tabMatrix}[STATE.tab])(m);
}
function renderCtrlBar(){
  const c=document.getElementById("ctrlbar"); if(!c)return;
  c.innerHTML=""; c.appendChild(periodBar());
}

// 공통: 가로 막대
function barList(items,maxVal,colorFn,labelFn,valFn){
  const wrap=el('<div></div>');
  items.forEach(it=>{
    const pct=maxVal?Math.max(2,it._v/maxVal*100):0;
    const row=el(`<div class="bar-row"><div class="name">${labelFn(it)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colorFn(it)}"></div></div>
      <div class="val">${valFn(it)}</div></div>`);
    wrap.appendChild(row);
  });
  return wrap;
}

// ── 탭 1: 전사 개요 (시점 + 비교) ────────────────────────────
function tabOverview(m){
  if(!STATE.ov){ m.appendChild(el('<div class="loading">불러오는 중…</div>')); return; }
  m.appendChild(rangeCaption(STATE.ov));
  const cur=STATE.ov.current, delta=STATE.ov.delta, meta=STATE.ov.meta;
  const hqs=meta.hqs||[];
  const typeLabel=(meta.scrb_type&&meta.scrb_type!=="전체")?meta.scrb_type:"";
  let groups=cur.by_group.slice();
  if(!STATE.simOn)groups=groups.filter(g=>!g.sim_only);
  const total=groups.reduce((s,g)=>s+g.count,0);

  // ① KPI — 총 판매 + Top3(단말군 색 랭크)
  m.appendChild(kpiOverview(groups,total,typeLabel,delta));
  // ② 도넛(단말군별 비중) + 본부별 100% 세로 누적
  const grid=el('<div class="grid-2"></div>');
  grid.appendChild(donutPanel(groups,total));
  grid.appendChild(vstackPanel(cur.hq_group_stacked,groups.map(g=>g.group),hqs));
  m.appendChild(grid);
  // ③ 단말군 × 본부 요약표
  m.appendChild(crossTable(cur.hq_group_stacked,groups,hqs));
}

function kpiOverview(groups,total,typeLabel,delta){
  const grid=el('<div class="kpi-grid"></div>');
  const c1=el('<div class="kpi"><div class="l"></div><div class="v"></div><div class="kpi-sub"></div></div>');
  c1.querySelector(".l").textContent=`총 ${typeLabel?typeLabel+" ":""}판매`;
  c1.querySelector(".v").innerHTML=`${num(total)}<span class="u">건</span>`;
  c1.querySelector(".kpi-sub").textContent=CHIP_LABEL[STATE.chip]||"선택 기간";
  if(delta&&delta.total_sales)c1.appendChild(deltaChip(delta.total_sales));
  grid.appendChild(c1);
  groups.slice(0,3).forEach((g,i)=>{
    const col=groupColor[g.group]||"var(--accent)";
    const card=el('<div class="kpi"><div class="l kpi-rank"><span class="rk"></span><span class="rn"></span></div><div class="v"></div><div class="kpi-sub"></div></div>');
    const rk=card.querySelector(".rk");rk.textContent=`#${i+1}`;rk.style.color=col;
    const rn=card.querySelector(".rn");rn.textContent=g.group;rn.style.color=col;
    card.querySelector(".v").innerHTML=`${num(g.count)}<span class="u">건</span>`;
    card.querySelector(".kpi-sub").textContent=`전사 ${g.share}%`;
    if(delta&&delta.by_group&&delta.by_group[g.group])card.appendChild(deltaChip(delta.by_group[g.group]));
    grid.appendChild(card);
  });
  return grid;
}
function deltaChip(d){
  const e=el('<div class="kpi-delta"></div>');
  if(d.pct!=null){const up=d.abs>0,flat=d.abs===0;
    e.className="kpi-delta "+(flat?"flat":up?"up":"down");
    e.textContent=`${flat?"–":up?"▲":"▼"} ${up?"+":""}${d.pct}% (${d.abs>0?"+":""}${num(d.abs)}건)`;
  }else{e.className="kpi-delta flat";e.textContent="비교 없음";}
  return e;
}

// 도넛(단말군별 비중) — SVG. 원둘레≈100(r=15.9155) 트릭으로 dasharray=비중%
function donutPanel(groups,total){
  const panel=el('<div class="panel"><div class="panel-hd"><h2>단말군별 비중</h2></div></div>');
  const tg=el(`<button class="qchip sim-toggle${STATE.simOn?" active":""}">SIMonly ${STATE.simOn?"ON":"OFF"}</button>`);
  tg.onclick=()=>{STATE.simOn=!STATE.simOn;render();};
  panel.querySelector(".panel-hd").appendChild(tg);
  const body=el('<div class="donut-body"></div>');
  body.appendChild(donutSvg(groups,total));
  body.appendChild(donutLegend(groups));
  panel.appendChild(body);
  return panel;
}
function donutSvg(groups,total){
  const R=15.91549, t=total||1; let cum=0;
  const arcs=groups.filter(g=>g.count>0).map(g=>{
    const sh=g.count/t*100, off=25-cum; cum+=sh;
    return `<circle cx="21" cy="21" r="${R}" fill="none" stroke="${groupColor[g.group]||'#888'}" stroke-width="5.4" stroke-dasharray="${sh.toFixed(3)} ${(100-sh).toFixed(3)}" stroke-dashoffset="${off.toFixed(3)}"><title>${g.group} · ${num(g.count)} (${g.share}%)</title></circle>`;
  }).join("");
  return el(`<svg class="donut" viewBox="0 0 42 42"><circle cx="21" cy="21" r="${R}" fill="none" stroke="var(--surface2)" stroke-width="5.4"></circle>${arcs}<text x="21" y="20" class="donut-total">${num(total)}</text><text x="21" y="24.6" class="donut-lbl">건</text></svg>`);
}
function donutLegend(groups){
  const lg=el('<div class="donut-legend"></div>');
  groups.forEach(g=>{
    const row=el('<div class="dlg-row"><i class="swatch"></i><span class="dlg-name"></span><span class="dlg-val"></span></div>');
    row.querySelector(".swatch").style.background=groupColor[g.group];
    row.querySelector(".dlg-name").textContent=g.group;
    row.querySelector(".dlg-val").textContent=`${g.share}%`;
    lg.appendChild(row);
  });
  return lg;
}

// 본부별 단말군 100% 세로 누적 (order[0]=최대 단말군이 하단 = column-reverse)
function vstackPanel(stacked,order,hqs){
  const panel=el('<div class="panel"><h2>본부별 단말군 구성 (100% 누적)</h2></div>');
  panel.appendChild(legend(order));
  const chart=el('<div class="vchart"></div>');
  const yax=el('<div class="vaxis"></div>');
  [100,80,60,40,20,0].forEach(v=>yax.appendChild(el(`<div>${v}%</div>`)));
  chart.appendChild(yax);
  const plot=el('<div class="vplot"></div>');
  const inc=order.filter(g=>STATE.simOn||g!=="SIMonly");
  hqs.forEach(hq=>{
    const s=((stacked.find(x=>x.hq===hq)||{}).groups)||{};
    const tot=inc.reduce((a,g)=>a+(s[g]||0),0)||1;
    const wrap=el('<div class="vcol-wrap"></div>');
    const col=el('<div class="vcol"></div>');
    inc.forEach(g=>{const c=s[g]||0;if(c>0){const seg=el(`<div class="vseg" title="${g} · ${num(c)} (${(c/tot*100).toFixed(1)}%)"></div>`);seg.style.height=(c/tot*100)+"%";seg.style.background=groupColor[g];col.appendChild(seg);}});
    wrap.appendChild(col);
    wrap.appendChild(el(`<div class="vcol-x">${hq}</div>`));
    plot.appendChild(wrap);
  });
  chart.appendChild(plot);
  panel.appendChild(chart);
  return panel;
}

// 단말군 × 본부 요약표 (셀=건수·본부내비중, 전사합/합계). 테이블 전체를 1개 문자열로 생성
function crossTable(stacked,groups,hqs){
  const panel=el('<div class="panel"><h2>단말군 × 본부 요약표</h2></div>');
  const map={};stacked.forEach(s=>map[s.hq]=s.groups||{});
  const colTot={};let grand=0;
  hqs.forEach(hq=>{let t=0;groups.forEach(g=>t+=(map[hq]&&map[hq][g.group])||0);colTot[hq]=t;grand+=t;});
  let h='<table class="xtab"><thead><tr><th class="xh-row">단말군</th>';
  hqs.forEach(hq=>h+=`<th>${hq}</th>`);
  h+='<th class="xh-tot">전사합</th></tr></thead><tbody>';
  groups.forEach(g=>{
    let rtot=0,cells="";
    hqs.forEach(hq=>{const c=(map[hq]&&map[hq][g.group])||0;rtot+=c;
      const sh=colTot[hq]?(c/colTot[hq]*100).toFixed(1):"0.0";
      cells+=`<td>${num(c)} <span class="xp">(${sh}%)</span></td>`;});
    h+=`<tr><td class="xn"><i class="swatch" style="margin-right:7px;background:${groupColor[g.group]}"></i>${g.group}</td>${cells}<td class="xtot">${num(rtot)}</td></tr>`;
  });
  h+='</tbody><tfoot><tr><td class="xn">합계</td>';
  hqs.forEach(hq=>h+=`<td>${num(colTot[hq])}</td>`);
  h+=`<td class="xtot">${num(grand)}</td></tr></tfoot></table>`;
  const sc=el('<div class="xtab-scroll"></div>');sc.appendChild(el(h));panel.appendChild(sc);
  return panel;
}

function legend(dg){
  const lg=el('<div class="legend"></div>');
  (dg||[]).filter(g=>STATE.simOn||g!=="SIMonly").forEach(g=>
    lg.appendChild(el(`<span><i class="swatch" style="background:${groupColor[g]}"></i>${g}</span>`)));
  return lg;
}

function kpiCard(label,value,unit,delta){
  const card=el(`<div class="kpi"><div class="l"></div><div class="v">${value}<span class="u">${unit}</span></div><div class="kpi-delta"></div></div>`);
  card.querySelector(".l").textContent=label;
  const d=card.querySelector(".kpi-delta");
  if(delta && delta.pct!=null){
    const up=delta.abs>0, flat=delta.abs===0;
    d.className="kpi-delta "+(flat?"flat":up?"up":"down");
    d.textContent=`${flat?"–":up?"▲":"▼"} ${up?"+":""}${delta.pct}% (${delta.abs>0?"+":""}${num(delta.abs)}건)`;
  }else if(delta){ d.className="kpi-delta flat"; d.textContent="비교 데이터 없음"; }
  else { d.remove(); }
  return card;
}

function dailyTrend(series,win){
  const panel=el('<div class="panel"><h2>일별 추이</h2><div class="trend"></div><div class="trend-cap"></div></div>');
  const t=panel.querySelector(".trend");
  const max=Math.max(...series.map(d=>d.sales_cnt),1);
  const step=Math.ceil(series.length/12);   // x축 라벨 과밀 방지
  series.forEach((d,i)=>{
    const h=Math.max(2,d.sales_cnt/max*100);
    const lbl=(i%step===0||i===series.length-1)?d.date.slice(6,8):"";
    t.appendChild(el(`<div class="trend-col" title="${fmtD(d.date)}: ${num(d.sales_cnt)}건"><div class="trend-bar" style="height:${h}%"></div><div class="trend-x">${lbl}</div></div>`));
  });
  if(win)panel.querySelector(".trend-cap").textContent=`${fmtD(win.start)} ~ ${fmtD(win.end)} · ${series.length}일`;
  return panel;
}

// ── 시점 + 비교 컨트롤 (Method 2: 캘린더 + 빠른선택 + 비교) ──
const QUICK=[["yesterday","어제"],["mtd","당월누적"],["prev_month","전월"],["last7","최근 7일"],["last30","최근 30일"]];
const COMPARES=[["none","없음"],["prev_day","전일"],["prev_weekday","전주동요일"],["prev_month","전월동기간"],["prev_year","작년동기간"]];
const COMPARE_KO={none:"없음",prev_day:"전일",prev_weekday:"전주 동요일",prev_month:"전월 동기간",prev_year:"작년 동기간"};
function fmtD(s){return s?`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`:"-";}
function _d(s){return new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));}
function _ymd(d){return ""+d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");}
function _addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function chipRange(chip,anchor){
  const a=_d(anchor);
  if(chip==="mtd")        return [_ymd(new Date(a.getFullYear(),a.getMonth(),1)),anchor];
  if(chip==="prev_month") return [_ymd(new Date(a.getFullYear(),a.getMonth()-1,1)),_ymd(new Date(a.getFullYear(),a.getMonth(),0))];
  if(chip==="last7")      return [_ymd(_addDays(a,-6)),anchor];
  if(chip==="last30")     return [_ymd(_addDays(a,-29)),anchor];
  return [anchor,anchor]; // yesterday(단일)
}
const CHIP_LABEL={realtime:"실시간",yesterday:"어제",mtd:"당월누적",prev_month:"전월",last7:"최근 7일",last30:"최근 30일"};
function _reloadMonthIfNeeded(){ // 달력 '월'을 월간 탭(SKU/본부/매트릭스/알림)에 적용
  const m=(STATE.anchor||"").slice(0,6);
  if(m && m!==STATE.loadedYm) loadBrief();
}
function applyChip(chip){
  const [s,e]=chipRange(chip,STATE.anchor);
  STATE.chip=chip; STATE.rangeStart=s; STATE.rangeEnd=e; STATE.anchor=e;  // 캘린더=기준일=range end
  _reloadMonthIfNeeded(); loadOverview();
}
function _clampYmd(ymd){ // 데이터 범위 밖이면 가장 가까운 경계로
  if(STATE.dataMin && ymd<STATE.dataMin) return STATE.dataMin;
  if(STATE.dataMax && ymd>STATE.dataMax) return STATE.dataMax;
  return ymd;
}
function applyDate(ymd){ // 캘린더 직접 선택 → 특정 일자(단일), 데이터 범위로 클램프
  ymd=_clampYmd(ymd);
  STATE.chip=null; STATE.anchor=ymd; STATE.rangeStart=ymd; STATE.rangeEnd=ymd;
  _reloadMonthIfNeeded(); loadOverview();
}
// 실시간: 데이터 최신일로 점프(=가장 최근 데이터 기준 단일일)
async function goRealtime(){
  STATE.chip="realtime"; if(STATE.tab==="overview") render();
  try{ const s=await fetch("/api/status").then(r=>r.json()); if(s.latest_exec_dt)STATE.anchor=s.latest_exec_dt; }catch(e){}
  const a=STATE.anchor; STATE.rangeStart=a; STATE.rangeEnd=a;
  _reloadMonthIfNeeded(); loadOverview();
}
function periodBar(){
  const bar=el('<div class="pbar"></div>');
  // 날짜(달력)
  const cal=el('<div class="pbar-grp"><span class="pbar-ic">📅</span></div>');
  const inp=el('<input type="date" class="pbar-date">');
  if(STATE.anchor)inp.value=fmtD(STATE.anchor);
  if(STATE.dataMin)inp.min=fmtD(STATE.dataMin);   // 데이터 있는 범위만 선택 가능
  if(STATE.dataMax)inp.max=fmtD(STATE.dataMax);
  inp.onchange=()=>{ if(inp.value)applyDate(inp.value.replaceAll("-","")); };
  cal.appendChild(inp); bar.appendChild(cal);
  // 빠른 선택 (실시간 + 기간 칩)
  const q=el('<div class="pbar-grp"><span class="pbar-lbl">빠른 선택</span><div class="qchips"></div></div>');
  const qc=q.querySelector(".qchips");
  const rt=el(`<button class="qchip rt${STATE.chip==="realtime"?" active":""}" title="최신 데이터로 이동">실시간</button>`);
  rt.onclick=goRealtime; qc.appendChild(rt);
  QUICK.forEach(([id,label])=>{const b=el(`<button class="qchip${STATE.chip===id?" active":""}">${label}</button>`);b.onclick=()=>applyChip(id);qc.appendChild(b);});
  bar.appendChild(q);
  // 비교 — 전사 개요 전용(델타 비교라 다른 탭엔 무의미)
  if(STATE.tab==="overview"){
    const c=el('<div class="pbar-grp"><span class="pbar-lbl">비교</span></div>');
    const sel=el('<select class="pbar-sel"></select>');
    COMPARES.forEach(([id,label])=>{const o=el(`<option value="${id}">${label}</option>`);if(STATE.compareTo===id)o.selected=true;sel.appendChild(o);});
    sel.onchange=()=>{STATE.compareTo=sel.value;loadOverview();};
    c.appendChild(sel); bar.appendChild(c);
    // 가입유형 필터 — 전사 개요 전용(기본 MNP). 도넛·누적·표가 선택 유형 기준으로 갱신
    const types=(STATE.ov&&STATE.ov.meta&&STATE.ov.meta.scrb_types)||["MNP","기변","신규","010신규"];
    const g=el('<div class="pbar-grp"><span class="pbar-lbl">가입유형</span><div class="qchips"></div></div>');
    const gc=g.querySelector(".qchips"); const curT=STATE.scrbType||"MNP";
    [["전체","전체"]].concat(types.map(t=>[t,t])).forEach(([id,lbl])=>{
      const b=el(`<button class="qchip${curT===id?" active":""}">${lbl}</button>`);
      b.onclick=()=>{STATE.scrbType=id;loadOverview();};
      gc.appendChild(b);
    });
    bar.appendChild(g);
  }
  // SIMonly — 전역 필터. 전사 개요는 도넛 패널의 토글로 노출하므로 여기선 다른 탭에서만
  if(STATE.tab!=="overview"){
    const sim=el('<div class="pbar-grp"><span class="pbar-lbl">SIMonly</span></div>');
    const sb=el(`<button class="qchip${STATE.simOn?" active":""}">${STATE.simOn?"포함":"제외"}</button>`);
    sb.onclick=()=>{STATE.simOn=!STATE.simOn; render();};
    sim.appendChild(sb); bar.appendChild(sim);
  }
  return bar;
}
function rangeCaption(ov){
  const r=ov.meta.range, cr=ov.meta.compare_range;
  const chipLabel=CHIP_LABEL[STATE.chip]||"특정 일자";
  let t=`조회: ${fmtD(r.start)} ~ ${fmtD(r.end)} (${chipLabel})`;
  if(cr)t+=`  vs  ${fmtD(cr.start)} ~ ${fmtD(cr.end)} (${COMPARE_KO[ov.meta.compare_to]||ov.meta.compare_to})`;
  return el(`<div class="pcap">${t}</div>`);
}

// ── 탭 2/3: SKU ──────────────────────────────────────────────
function tabSku(group){
  const m=document.getElementById("main");
  const s=STATE.brief.sku[group];
  if(!s){m.innerHTML=`<div class="error">${group} 데이터 없음</div>`;return;}
  const kpi=el('<div class="kpi-grid"></div>');
  kpi.appendChild(el(`<div class="kpi"><div class="l">${group} 총 판매</div><div class="v">${num(s.total)}<span class="u">건</span></div></div>`));
  kpi.appendChild(el(`<div class="kpi"><div class="l">최다 SKU</div><div class="v" style="font-size:17px">${s.top_sku||"-"}</div></div>`));
  kpi.appendChild(el(`<div class="kpi"><div class="l">최다 본부</div><div class="v" style="font-size:19px">${s.top_hq||"-"}</div></div>`));
  kpi.appendChild(el(`<div class="kpi"><div class="l">SKU 수</div><div class="v">${s.by_sku.length}<span class="u">종</span></div></div>`));
  m.appendChild(kpi);

  const p1=el('<div class="panel"><h2>SKU별 판매</h2></div>');
  const maxS=Math.max(...s.by_sku.map(x=>x.count),1);
  s.by_sku.forEach((x,i)=>x._v=x.count);
  p1.appendChild(barList(s.by_sku,maxS,()=>"var(--accent)",x=>x.sku,x=>`${num(x.count)} · ${x.share}%`));
  m.appendChild(p1);

  // SKU × 본부 상세표
  const hqs=STATE.brief.meta.hqs;
  const p2=el('<div class="panel"><h2>SKU × 본부 상세</h2><div class="table-wrap"></div></div>');
  const tbl=el('<table></table>');
  tbl.appendChild(el(`<thead><tr><th>SKU</th>${hqs.map(h=>`<th>${h}</th>`).join("")}<th>합계</th></tr></thead>`));
  const tb=el('<tbody></tbody>');
  s.detail.forEach(d=>{
    tb.appendChild(el(`<tr><td>${d.sku}</td>${hqs.map(h=>`<td>${num(d.hq_counts[h]||0)}</td>`).join("")}<td><b>${num(d.total)}</b></td></tr>`));
  });
  tbl.appendChild(tb);
  p2.querySelector(".table-wrap").appendChild(tbl);
  m.appendChild(p2);
}

// ── 탭 4: 본부별 분석 ────────────────────────────────────────
function tabByHq(m){
  const list=STATE.brief.by_hq;
  if(!STATE.activeHq)STATE.activeHq=list[0]?.hq;
  const chips=el('<div class="hq-chips"></div>');
  list.forEach(hq=>{
    const c=el(`<div class="hq-chip ${hq.hq===STATE.activeHq?"active":""}">${hq.hq}</div>`);
    c.onclick=()=>{STATE.activeHq=hq.hq;render();};
    chips.appendChild(c);
  });
  m.appendChild(chips);

  const hq=list.find(h=>h.hq===STATE.activeHq);
  const port=hq.portfolio.filter(p=>STATE.simOn||p.group!=="SIMonly");  // 전역 SIMonly 필터
  const total=port.reduce((s,p)=>s+p.count,0);
  const kpi=el('<div class="kpi-grid" style="grid-template-columns:repeat(2,1fr)"></div>');
  kpi.appendChild(el(`<div class="kpi"><div class="l">${hq.hq} 총 판매</div><div class="v">${num(total)}<span class="u">건</span></div></div>`));
  const topOver=port.slice().sort((a,b)=>b.over_index-a.over_index)[0];
  kpi.appendChild(el(`<div class="kpi"><div class="l">최대 과다 단말군</div><div class="v" style="font-size:18px">${topOver?topOver.group:"-"} <span class="u oi-pos">${topOver?(topOver.over_index>0?"+":"")+topOver.over_index+"p":""}</span></div></div>`));
  m.appendChild(kpi);

  const p=el('<div class="panel"><h2>단말군 포트폴리오 · 과/과소 지수</h2><div class="table-wrap"></div></div>');
  const tbl=el('<table><thead><tr><th>단말군</th><th>판매</th><th>본부내비율</th><th>전사비중</th><th>과/과소</th></tr></thead></table>');
  const tb=el('<tbody></tbody>');
  port.forEach(p2=>{
    const cls=p2.over_index>0?"oi-pos":(p2.over_index<0?"oi-neg":"");
    tb.appendChild(el(`<tr><td>${p2.group}</td><td>${num(p2.count)}</td><td>${p2.share_in_hq}%</td><td>${p2.share_company}%</td><td class="${cls}">${p2.over_index>0?"+":""}${p2.over_index}p</td></tr>`));
  });
  tbl.appendChild(tb);
  p.querySelector(".table-wrap").appendChild(tbl);
  m.appendChild(p);
}

// ── 탭 5: 알림 ───────────────────────────────────────────────
function tabAlerts(m){
  const alerts=(STATE.brief.alerts||[]).filter(a=>STATE.simOn||a.group!=="SIMonly");  // 전역 SIMonly 필터
  const counts={urgent:0,warn:0,info:0};alerts.forEach(a=>counts[a.level]++);
  const kpi=el('<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)"></div>');
  kpi.appendChild(el(`<div class="kpi"><div class="l">긴급</div><div class="v" style="color:${counts.urgent?'var(--red)':'var(--dim)'}">${counts.urgent}</div></div>`));
  kpi.appendChild(el(`<div class="kpi"><div class="l">주의</div><div class="v" style="color:${counts.warn?'var(--orange)':'var(--dim)'}">${counts.warn}</div></div>`));
  kpi.appendChild(el(`<div class="kpi"><div class="l">정보</div><div class="v" style="color:var(--muted)">${counts.info}</div></div>`));
  m.appendChild(kpi);

  const p=el('<div class="panel"><h2>알림 목록</h2></div>');
  if(!alerts.length)p.appendChild(el('<div class="loading">알림 없음</div>'));
  const lvLabel={urgent:"긴급",warn:"주의",info:"정보"};
  alerts.forEach(a=>p.appendChild(
    el(`<div class="alert ${a.level}"><span class="lv">${lvLabel[a.level]}</span><span class="msg">${a.message}</span></div>`)));
  m.appendChild(p);
}

// ── 탭 6: 본부 매트릭스 ──────────────────────────────────────
function tabMatrix(m){
  const mx=STATE.brief.matrix;
  const groups=mx.groups.filter(g=>STATE.simOn||g!=="SIMonly");   // 전역 SIMonly 필터
  const cellMap={};
  mx.cells.forEach(c=>cellMap[c.hq+"|"+c.group]=c);
  const maxRatio=Math.max(...mx.cells.filter(c=>groups.includes(c.group)).map(c=>c.ratio_in_hq),1);

  const p=el('<div class="panel"><h2>본부 × 단말군 (셀: 본부내 비율%)</h2><div class="table-wrap"></div></div>');
  const tbl=el('<table class="heat"></table>');
  tbl.appendChild(el(`<thead><tr><th>본부</th>${groups.map(g=>`<th>${g}</th>`).join("")}</tr></thead>`));
  const tb=el('<tbody></tbody>');
  mx.hqs.forEach(hq=>{
    const tds=groups.map(g=>{
      const c=cellMap[hq+"|"+g];const r=c?c.ratio_in_hq:0;
      const a=(r/maxRatio*0.85+0.05).toFixed(2);
      return `<td style="background:rgba(var(--accent-rgb),${a})" title="${num(c?c.count:0)}건">${r}%</td>`;
    }).join("");
    tb.appendChild(el(`<tr><td class="hqname">${hq}</td>${tds}</tr>`));
  });
  tbl.appendChild(tb);
  p.querySelector(".table-wrap").appendChild(tbl);
  m.appendChild(p);
}

// ── init ────────────────────────────────────────────────────
// (기준월/조회/SIMonly 전역바 제거 — 날짜는 전사개요 달력, SIMonly는 컨트롤바로 이동)

// ── 테마: 라이트/다크 토글 + localStorage persist ──────────────
const THEME_KEY="mds-theme";
function applyTheme(t){
  document.body.dataset.theme=t;
  // 버튼 아이콘: 현재 다크면 ☀️(라이트로), 라이트면 🌙(다크로)
  document.getElementById("themeBtn").textContent=(t==="dark")?"☀️":"🌙";
}
function initTheme(){
  // 기본은 라이트. 사용자가 토글로 바꾼 적 있으면 그 선호를 유지(localStorage).
  let t=localStorage.getItem(THEME_KEY);
  if(t!=="light"&&t!=="dark") t="light";
  applyTheme(t);
}
document.getElementById("themeBtn").onclick=()=>{
  const next=document.body.dataset.theme==="dark"?"light":"dark";
  localStorage.setItem(THEME_KEY,next);
  applyTheme(next);
  assignColors();           // 테마 팔레트로 단말군 색 재매핑
  if(STATE.brief||STATE.ov) render();
};
document.getElementById("helpBtn").onclick=()=>alert(

  "· 기준월(YYYYMM) 입력 후 조회\n"+

  "· 우상단 🌙/☀️ 로 라이트·다크 전환 (자동 저장)\n"+
  "· 좌상단 상태칩 클릭 → 데이터 연결 4단계 진단\n\n"+
  "데이터 소스: obt_encore_max.device_sales_summary_daily2 (Polaris Gateway 메모리 캐시)");

// 상태칩 클릭 → 진단 드로어
const _chip=document.getElementById("srcChip");
_chip.classList.add("clickable"); _chip.onclick=openDiag;
document.getElementById("diagClose").onclick=closeDiag;
document.getElementById("diagBackdrop").onclick=closeDiag;
document.getElementById("diagReload").onclick=async()=>{

initTheme();
(async()=>{await loadStatus();loadDiagnostics();await loadBrief();applyChip(STATE.chip);})();
